{% extends "base.html" %}

{% block title %}API管理 - 备件管理系统{% endblock %}

{% block page_title %}API 管理{% endblock %}

{% block content %}
<style>
    .action-btn {
        padding: 0.25rem 0.5rem;
        font-size: 0.875rem;
    }
    
    .table-container {
        background: white;
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        overflow: hidden;
    }
    
    .status-badge {
        padding: 0.25rem 0.75rem;
        border-radius: 9999px;
        font-size: 0.75rem;
        font-weight: 500;
    }
    
    .status-published {
        background: #dcfce7;
        color: #166534;
    }
    
    .status-draft {
        background: #fef3c7;
        color: #92400e;
    }
    
    .method-badge {
        padding: 0.25rem 0.5rem;
        border-radius: 6px;
        font-size: 0.75rem;
        font-weight: 700;
        min-width: 60px;
        text-align: center;
    }
    
    .method-get { background: #dbeafe; color: #1d4ed8; }
    .method-post { background: #dcfce7; color: #166534; }
    .method-put { background: #fef3c7; color: #92400e; }
    .method-delete { background: #fee2e2; color: #991b1b; }
</style>

<div class="card border-0 shadow-sm mb-4" style="border-radius: 12px;">
    <div class="card-body p-4">
        <div class="d-flex justify-content-between align-items-center">
            <h5 class="mb-0">
                <i class="fas fa-cogs text-primary me-2"></i>API 接口管理
            </h5>
            <button class="btn btn-primary" onclick="alert('创建API功能待完善')">
                <i class="fas fa-plus me-2"></i>新建接口
            </button>
        </div>
    </div>
</div>

<div class="row mb-4">
    <div class="col-md-6">
        <div class="input-group">
            <span class="input-group-text bg-white">
                <i class="fas fa-filter"></i>
            </span>
            <select class="form-select" id="categoryFilter">
                <option value="">所有分类</option>
            </select>
        </div>
    </div>
    <div class="col-md-6">
        <div class="input-group">
            <span class="input-group-text bg-white">
                <i class="fas fa-search"></i>
            </span>
            <input type="text" class="form-control" id="searchInput" 
                   placeholder="搜索接口...">
        </div>
    </div>
</div>

<div class="table-container">
    <div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr>
                    <th>方法</th>
                    <th style="width: 40%">接口名称</th>
                    <th>路径</th>
                    <th>分类</th>
                    <th>状态</th>
                    <th class="text-end" style="width: 150px">操作</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="6" class="text-center text-muted py-5">
                        <div class="spinner-border" role="status">
                            <span class="visually-hidden">加载中...</span>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<div class="mt-4">
    <a href="{{ url_for('api_management.api_logs') }}" class="btn btn-outline-primary">
        <i class="fas fa-history me-2"></i>查看调用日志
    </a>
</div>
{% endblock %}
