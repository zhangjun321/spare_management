<!-- 交易管理轮播图 -->
<div id="transactionCarousel" class="carousel slide carousel-section" data-bs-ride="carousel">
    <div class="carousel-indicators">
        <button type="button" data-bs-target="#transactionCarousel" data-bs-slide-to="0" class="active"></button>
        <button type="button" data-bs-target="#transactionCarousel" data-bs-slide-to="1"></button>
        <button type="button" data-bs-target="#transactionCarousel" data-bs-slide-to="2"></button>
        <button type="button" data-bs-target="#transactionCarousel" data-bs-slide-to="3"></button>
        <button type="button" data-bs-target="#transactionCarousel" data-bs-slide-to="4"></button>
        <button type="button" data-bs-target="#transactionCarousel" data-bs-slide-to="5"></button>
    </div>
    
    <div class="carousel-inner">
        <!-- 图片 1：入库交易 -->
        <div class="carousel-item active">
            <img src="/static/images/carousel/transaction_01.jpg" alt="transaction 图片1" loading="lazy">
            <div class="carousel-caption">
                <h5><i class="fas fa-arrow-down me-2"></i>规范入库流程</h5>
                <p>采购入库、退货入库、调拨入库多种类型</p>
            </div>
        </div>
        
        <!-- 图片 2：出库交易 -->
        <div class="carousel-item">
            <img src="/static/images/carousel/transaction_02.jpg" alt="transaction 图片2" loading="lazy">
            <div class="carousel-caption">
                <h5><i class="fas fa-arrow-up me-2"></i>严格出库管理</h5>
                <p>领用出库、销售出库、报废出库全程跟踪</p>
            </div>
        </div>
        
        <!-- 图片 3：库存调拨 -->
        <div class="carousel-item">
            <img src="/static/images/carousel/transaction_03.jpg" alt="transaction 图片3" loading="lazy">
            <div class="carousel-caption">
                <h5><i class="fas fa-random me-2"></i>灵活库存调拨</h5>
                <p>仓库间调拨，优化库存结构</p>
            </div>
        </div>
        
        <!-- 图片 4：交易追溯 -->
        <div class="carousel-item">
            <img src="/static/images/carousel/transaction_04.jpg" alt="transaction 图片4" loading="lazy">
            <div class="carousel-caption">
                <h5><i class="fas fa-search me-2"></i>完整交易追溯</h5>
                <p>每笔交易可查询，责任到人</p>
            </div>
        </div>
        
        <!-- 图片 5：库存调整 -->
        <div class="carousel-item">
            <img src="/static/images/carousel/transaction_05.jpg" alt="transaction 图片5" loading="lazy">
            <div class="carousel-caption">
                <h5><i class="fas fa-edit me-2"></i>灵活库存调整</h5>
                <p>盘盈盘亏处理，保持账实相符</p>
            </div>
        </div>
        
        <!-- 图片 6：交易报表 -->
        <div class="carousel-item">
            <img src="/static/images/carousel/transaction_06.jpg" alt="transaction 图片6" loading="lazy">
            <div class="carousel-caption">
                <h5><i class="fas fa-file-invoice me-2"></i>详细交易报表</h5>
                <p>出入库汇总，交易明细查询</p>
            </div>
        </div>
    </div>
    
    <button class="carousel-control-prev" type="button" data-bs-target="#transactionCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#transactionCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
    </button>
</div>
