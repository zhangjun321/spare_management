<!-- 报表统计轮播图 -->
<div id="reportCarousel" class="carousel slide carousel-section" data-bs-ride="carousel">
    <div class="carousel-indicators">
        <button type="button" data-bs-target="#reportCarousel" data-bs-slide-to="0" class="active"></button>
        <button type="button" data-bs-target="#reportCarousel" data-bs-slide-to="1"></button>
        <button type="button" data-bs-target="#reportCarousel" data-bs-slide-to="2"></button>
        <button type="button" data-bs-target="#reportCarousel" data-bs-slide-to="3"></button>
        <button type="button" data-bs-target="#reportCarousel" data-bs-slide-to="4"></button>
        <button type="button" data-bs-target="#reportCarousel" data-bs-slide-to="5"></button>
    </div>
    
    <div class="carousel-inner">
        <!-- 图片 1：库存报表 -->
        <div class="carousel-item active">
            <img src="https://picsum.photos/1920/600?random=70" alt="库存报表">
            <div class="carousel-caption">
                <h5><i class="fas fa-chart-area me-2"></i>库存统计报表</h5>
                <p>库存总量、周转率、库龄分析一目了然</p>
            </div>
        </div>
        
        <!-- 图片 2：趋势分析 -->
        <div class="carousel-item">
            <img src="https://picsum.photos/1920/600?random=71" alt="趋势分析">
            <div class="carousel-caption">
                <h5><i class="fas fa-chart-line me-2"></i>业务趋势分析</h5>
                <p>出入库趋势、消耗预测，辅助决策</p>
            </div>
        </div>
        
        <!-- 图片 3：成本分析 -->
        <div class="carousel-item">
            <img src="https://picsum.photos/1920/600?random=72" alt="成本分析">
            <div class="carousel-caption">
                <h5><i class="fas fa-coins me-2"></i>成本分析报表</h5>
                <p>采购成本、库存成本、维修成本全面分析</p>
            </div>
        </div>
        
        <!-- 图片 4：绩效报表 -->
        <div class="carousel-item">
            <img src="https://picsum.photos/1920/600?random=73" alt="绩效报表">
            <div class="carousel-caption">
                <h5><i class="fas fa-trophy me-2"></i>绩效考核报表</h5>
                <p>部门绩效、人员绩效、供应商绩效评估</p>
            </div>
        </div>
        
        <!-- 图片 5：数据可视化 -->
        <div class="carousel-item">
            <img src="https://picsum.photos/1920/600?random=74" alt="数据可视化">
            <div class="carousel-caption">
                <h5><i class="fas fa-chart-pie me-2"></i>数据可视化</h5>
                <p>饼图、柱状图、折线图多维度展示</p>
            </div>
        </div>
        
        <!-- 图片 6：导出分享 -->
        <div class="carousel-item">
            <img src="https://picsum.photos/1920/600?random=75" alt="导出分享">
            <div class="carousel-caption">
                <h5><i class="fas fa-download me-2"></i>报表导出分享</h5>
                <p>Excel、PDF 多种格式，支持定时推送</p>
            </div>
        </div>
    </div>
    
    <button class="carousel-control-prev" type="button" data-bs-target="#reportCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#reportCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
    </button>
</div>
