<!-- 仓库管理轮播图 -->
<div id="warehouseCarousel" class="carousel slide carousel-section" data-bs-ride="carousel">
    <div class="carousel-indicators">
        <button type="button" data-bs-target="#warehouseCarousel" data-bs-slide-to="0" class="active"></button>
        <button type="button" data-bs-target="#warehouseCarousel" data-bs-slide-to="1"></button>
        <button type="button" data-bs-target="#warehouseCarousel" data-bs-slide-to="2"></button>
        <button type="button" data-bs-target="#warehouseCarousel" data-bs-slide-to="3"></button>
        <button type="button" data-bs-target="#warehouseCarousel" data-bs-slide-to="4"></button>
        <button type="button" data-bs-target="#warehouseCarousel" data-bs-slide-to="5"></button>
    </div>
    
    <div class="carousel-inner">
        <!-- 图片 1：智能化立体仓库 -->
        <div class="carousel-item active">
            <img src="/static/images/carousel/warehouse_01.jpg" alt="warehouse 图片 1" loading="lazy">
            <div class="carousel-caption">
                <h5><i class="fas fa-warehouse me-2"></i>智能化立体仓库</h5>
                <p>现代化仓储设施，智能化管理系统</p>
            </div>
        </div>
        
        <!-- 图片 2：入库管理 -->
        <div class="carousel-item">
            <img src="/static/images/carousel/warehouse_02.jpg" alt="warehouse 图片 2" loading="lazy">
            <div class="carousel-caption">
                <h5><i class="fas fa-download me-2"></i>规范入库流程</h5>
                <p>严格质检入库，确保物资品质</p>
            </div>
        </div>
        
        <!-- 图片 3：出库管理 -->
        <div class="carousel-item">
            <img src="/static/images/carousel/warehouse_03.jpg" alt="warehouse 图片 3" loading="lazy">
            <div class="carousel-caption">
                <h5><i class="fas fa-upload me-2"></i>高效出库管理</h5>
                <p>快速响应需求，精准配货出库</p>
            </div>
        </div>
        
        <!-- 图片 4：库存管理 -->
        <div class="carousel-item">
            <img src="/static/images/carousel/warehouse_04.jpg" alt="warehouse 图片 4" loading="lazy">
            <div class="carousel-caption">
                <h5><i class="fas fa-boxes me-2"></i>实时库存监控</h5>
                <p>精准库存预警，智能补货建议</p>
            </div>
        </div>
        
        <!-- 图片 5：AI 数据分析 -->
        <div class="carousel-item">
            <img src="/static/images/carousel/warehouse_05.jpg" alt="warehouse 图片 5" loading="lazy">
            <div class="carousel-caption">
                <h5><i class="fas fa-brain me-2"></i>AI 智能分析</h5>
                <p>数据驱动决策，优化库存周转</p>
            </div>
        </div>
        
        <!-- 图片 6：货位管理 -->
        <div class="carousel-item">
            <img src="/static/images/carousel/warehouse_06.jpg" alt="warehouse 图片 6" loading="lazy">
            <div class="carousel-caption">
                <h5><i class="fas fa-map-marker-alt me-2"></i>智能货位管理</h5>
                <p>科学货位规划，提升空间利用率</p>
            </div>
        </div>
    </div>
    
    <button class="carousel-control-prev" type="button" data-bs-target="#warehouseCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#warehouseCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
    </button>
</div>
