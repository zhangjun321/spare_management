<!-- 仓库管理轮播图 -->
<div id="warehouseCarousel" class="carousel slide carousel-section" data-bs-ride="carousel">
    <div class="carousel-indicators">
        <button type="button" data-bs-target="#warehouseCarousel" data-bs-slide-to="0" class="active"></button>
        <button type="button" data-bs-target="#warehouseCarousel" data-bs-slide-to="1"></button>
        <button type="button" data-bs-target="#warehouseCarousel" data-bs-slide-to="2"></button>
        <button type="button" data-bs-target="#warehouseCarousel" data-bs-slide-to="3"></button>
        <button type="button" data-bs-target="#warehouseCarousel" data-bs-slide-to="4"></button>
        <button type="button" data-bs-target="#warehouseCarousel" data-bs-slide-to="5"></button>
    </div>
    
    <div class="carousel-inner">
        <!-- 图片 1：智能立体仓库 -->
        <div class="carousel-item active">
            <img src="https://images.unsplash.com/photo-1553413077-190dd305871c?w=1920&h=600&fit=crop" 
                 alt="智能立体仓库" 
                 onerror="this.src='https://picsum.photos/1920/600?grayscale&random=20'">
            <div class="carousel-caption">
                <h5><i class="fas fa-warehouse me-2"></i>现代化仓储设施</h5>
                <p>智能货位管理，最大化仓储空间利用率</p>
            </div>
        </div>
        
        <!-- 图片 2：货架管理 -->
        <div class="carousel-item">
            <img src="https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?w=1920&h=600&fit=crop" 
                 alt="货架管理" 
                 onerror="this.src='https://picsum.photos/1920/600?grayscale&random=21'">
            <div class="carousel-caption">
                <h5><i class="fas fa-th me-2"></i>智能货位分配</h5>
                <p>ABC 分类存储，提高拣货效率</p>
            </div>
        </div>
        
        <!-- 图片 3：AGV 搬运机器人 -->
        <div class="carousel-item">
            <img src="https://images.unsplash.com/photo-1565514020176-db936c4f5f7d?w=1920&h=600&fit=crop" 
                 alt="AGV 搬运" 
                 onerror="this.src='https://picsum.photos/1920/600?grayscale&random=22'">
            <div class="carousel-caption">
                <h5><i class="fas fa-exchange-alt me-2"></i>灵活库存调拨</h5>
                <p>多仓库协同，优化库存分布</p>
            </div>
        </div>
        
        <!-- 图片 4：温湿度监控系统 -->
        <div class="carousel-item">
            <img src="https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?w=1920&h=600&fit=crop" 
                 alt="监控系统" 
                 onerror="this.src='https://picsum.photos/1920/600?grayscale&random=23'">
            <div class="carousel-caption">
                <h5><i class="fas fa-shield-alt me-2"></i>全方位安全监控</h5>
                <p>温湿度监控，确保备件存储环境</p>
            </div>
        </div>
        
        <!-- 图片 5：自动化分拣线 -->
        <div class="carousel-item">
            <img src="https://images.unsplash.com/photo-1605788102039-7908548a50ea?w=1920&h=600&fit=crop" 
                 alt="自动化分拣" 
                 onerror="this.src='https://picsum.photos/1920/600?grayscale&random=24'">
            <div class="carousel-caption">
                <h5><i class="fas fa-sort me-2"></i>自动化智能分拣</h5>
                <p>路径优化算法，提升作业效率</p>
            </div>
        </div>
        
        <!-- 图片 6：数据报表分析 -->
        <div class="carousel-item">
            <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=1920&h=600&fit=crop" 
                 alt="数据报表" 
                 onerror="this.src='https://picsum.photos/1920/600?grayscale&random=25'">
            <div class="carousel-caption">
                <h5><i class="fas fa-file-alt me-2"></i>详细仓储报表</h5>
                <p>出入库统计，库存周转分析</p>
            </div>
        </div>
    </div>
    
    <button class="carousel-control-prev" type="button" data-bs-target="#warehouseCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#warehouseCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
    </button>
</div>
