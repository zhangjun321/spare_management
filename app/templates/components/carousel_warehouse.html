<!-- 仓库管理轮播图 -->
<div id="warehouseCarousel" class="carousel slide carousel-section" data-bs-ride="carousel">
    <div class="carousel-indicators">
        <button type="button" data-bs-target="#warehouseCarousel" data-bs-slide-to="0" class="active"></button>
        <button type="button" data-bs-target="#warehouseCarousel" data-bs-slide-to="1"></button>
        <button type="button" data-bs-target="#warehouseCarousel" data-bs-slide-to="2"></button>
        <button type="button" data-bs-target="#warehouseCarousel" data-bs-slide-to="3"></button>
        <button type="button" data-bs-target="#warehouseCarousel" data-bs-slide-to="4"></button>
        <button type="button" data-bs-target="#warehouseCarousel" data-bs-slide-to="5"></button>
    </div>
    
    <div class="carousel-inner">
        <!-- 图片 1：现代化仓库 -->
        <div class="carousel-item active">
            <img src="https://picsum.photos/1920/600?random=20" alt="现代化仓库">
            <div class="carousel-caption">
                <h5><i class="fas fa-warehouse me-2"></i>现代化仓储设施</h5>
                <p>智能货位管理，最大化仓储空间利用率</p>
            </div>
        </div>
        
        <!-- 图片 2：货位优化 -->
        <div class="carousel-item">
            <img src="https://picsum.photos/1920/600?random=21" alt="货位优化">
            <div class="carousel-caption">
                <h5><i class="fas fa-th me-2"></i>智能货位分配</h5>
                <p>ABC 分类存储，提高拣货效率</p>
            </div>
        </div>
        
        <!-- 图片 3：库存调拨 -->
        <div class="carousel-item">
            <img src="https://picsum.photos/1920/600?random=22" alt="库存调拨">
            <div class="carousel-caption">
                <h5><i class="fas fa-exchange-alt me-2"></i>灵活库存调拨</h5>
                <p>多仓库协同，优化库存分布</p>
            </div>
        </div>
        
        <!-- 图片 4：安全监控 -->
        <div class="carousel-item">
            <img src="https://picsum.photos/1920/600?random=23" alt="安全监控">
            <div class="carousel-caption">
                <h5><i class="fas fa-shield-alt me-2"></i>全方位安全监控</h5>
                <p>温湿度监控，确保备件存储环境</p>
            </div>
        </div>
        
        <!-- 图片 5：智能分拣 -->
        <div class="carousel-item">
            <img src="https://picsum.photos/1920/600?random=24" alt="智能分拣">
            <div class="carousel-caption">
                <h5><i class="fas fa-sort me-2"></i>自动化智能分拣</h5>
                <p>路径优化算法，提升作业效率</p>
            </div>
        </div>
        
        <!-- 图片 6：仓储报表 -->
        <div class="carousel-item">
            <img src="https://picsum.photos/1920/600?random=25" alt="仓储报表">
            <div class="carousel-caption">
                <h5><i class="fas fa-file-alt me-2"></i>详细仓储报表</h5>
                <p>出入库统计，库存周转分析</p>
            </div>
        </div>
    </div>
    
    <button class="carousel-control-prev" type="button" data-bs-target="#warehouseCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#warehouseCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
    </button>
</div>
