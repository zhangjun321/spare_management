<!-- 仓库管理轮播图 -->
<div id="warehouseCarousel" class="carousel slide carousel-section" data-bs-ride="carousel">
    <div class="carousel-indicators">
        <button type="button" data-bs-target="#warehouseCarousel" data-bs-slide-to="0" class="active"></button>
        <button type="button" data-bs-target="#warehouseCarousel" data-bs-slide-to="1"></button>
        <button type="button" data-bs-target="#warehouseCarousel" data-bs-slide-to="2"></button>
        <button type="button" data-bs-target="#warehouseCarousel" data-bs-slide-to="3"></button>
        <button type="button" data-bs-target="#warehouseCarousel" data-bs-slide-to="4"></button>
        <button type="button" data-bs-target="#warehouseCarousel" data-bs-slide-to="5"></button>
    </div>
    
    <div class="carousel-inner">
        <!-- 图片 1：全景仓库概览 -->
        <div class="carousel-item active">
            <img src="/static/images/carousel/warehouse_01.jpg" alt="现代化智能仓库全景" loading="lazy">
            <div class="carousel-caption">
                <h5><i class="fas fa-warehouse me-2"></i>现代化智能仓库</h5>
                <p>全景仓储设施一览，自动化管理提升效率</p>
            </div>
        </div>
        
        <!-- 图片 2：库位编码管理 -->
        <div class="carousel-item">
            <img src="/static/images/carousel/warehouse_02.jpg" alt="货位编码管理" loading="lazy">
            <div class="carousel-caption">
                <h5><i class="fas fa-map-marker-alt me-2"></i>精准库位管理</h5>
                <p>三级库位编码体系，扫码定位秒级响应</p>
            </div>
        </div>
        
        <!-- 图片 3：入库收货作业 -->
        <div class="carousel-item">
            <img src="/static/images/carousel/warehouse_03.jpg" alt="入库收货作业" loading="lazy">
            <div class="carousel-caption">
                <h5><i class="fas fa-truck-loading me-2"></i>规范入库流程</h5>
                <p>严格质检验收，收货信息实时录入系统</p>
            </div>
        </div>
        
        <!-- 图片 4：出库分拣作业 -->
        <div class="carousel-item">
            <img src="/static/images/carousel/warehouse_04.jpg" alt="出库分拣作业" loading="lazy">
            <div class="carousel-caption">
                <h5><i class="fas fa-dolly me-2"></i>高效出库作业</h5>
                <p>智能拣货路径规划，快速精准配货出库</p>
            </div>
        </div>
        
        <!-- 图片 5：库存盘点作业 -->
        <div class="carousel-item">
            <img src="/static/images/carousel/warehouse_05.jpg" alt="库存盘点作业" loading="lazy">
            <div class="carousel-caption">
                <h5><i class="fas fa-clipboard-check me-2"></i>周期盘点管理</h5>
                <p>系统化盘点流程，实时掌握库存真实数据</p>
            </div>
        </div>
        
        <!-- 图片 6：数字化管理看板 -->
        <div class="carousel-item">
            <img src="/static/images/carousel/warehouse_06.jpg" alt="数字化仓库管理看板" loading="lazy">
            <div class="carousel-caption">
                <h5><i class="fas fa-chart-line me-2"></i>数字化运营看板</h5>
                <p>实时数据可视化，智能决策支持仓库运营</p>
            </div>
        </div>
    </div>
    
    <button class="carousel-control-prev" type="button" data-bs-target="#warehouseCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#warehouseCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
    </button>
</div>
