<!-- 维修管理轮播图 -->
<div id="maintenanceCarousel" class="carousel slide carousel-section" data-bs-ride="carousel">
    <div class="carousel-indicators">
        <button type="button" data-bs-target="#maintenanceCarousel" data-bs-slide-to="0" class="active"></button>
        <button type="button" data-bs-target="#maintenanceCarousel" data-bs-slide-to="1"></button>
        <button type="button" data-bs-target="#maintenanceCarousel" data-bs-slide-to="2"></button>
        <button type="button" data-bs-target="#maintenanceCarousel" data-bs-slide-to="3"></button>
        <button type="button" data-bs-target="#maintenanceCarousel" data-bs-slide-to="4"></button>
        <button type="button" data-bs-target="#maintenanceCarousel" data-bs-slide-to="5"></button>
    </div>
    
    <div class="carousel-inner">
        <!-- 图片 1：维修工单管理 -->
        <div class="carousel-item active">
            <img src="https://images.unsplash.com/photo-1542744173-8e7e53415bb0?w=1920&h=600&fit=crop" 
                 alt="工单管理" 
                 onerror="this.src='https://picsum.photos/1920/600?grayscale&random=40'">
            <div class="carousel-caption">
                <h5><i class="fas fa-clipboard-check me-2"></i>工单全流程管理</h5>
                <p>从报修到验收，闭环管理每一环节</p>
            </div>
        </div>
        
        <!-- 图片 2：快速响应维修 -->
        <div class="carousel-item">
            <img src="https://images.unsplash.com/photo-1581092160562-40aa08e78837?w=1920&h=600&fit=crop" 
                 alt="快速响应" 
                 onerror="this.src='https://picsum.photos/1920/600?grayscale&random=41'">
            <div class="carousel-caption">
                <h5><i class="fas fa-bolt me-2"></i>快速响应机制</h5>
                <p>紧急工单优先处理，减少停机时间</p>
            </div>
        </div>
        
        <!-- 图片 3：专业维修团队 -->
        <div class="carousel-item">
            <img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=1920&h=600&fit=crop" 
                 alt="维修团队" 
                 onerror="this.src='https://picsum.photos/1920/600?grayscale&random=42'">
            <div class="carousel-caption">
                <h5><i class="fas fa-users-cog me-2"></i>专业维修团队</h5>
                <p>技能矩阵管理，合理分配工单</p>
            </div>
        </div>
        
        <!-- 图片 4：维修记录追溯 -->
        <div class="carousel-item">
            <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=1920&h=600&fit=crop" 
                 alt="维修记录" 
                 onerror="this.src='https://picsum.photos/1920/600?grayscale&random=43'">
            <div class="carousel-caption">
                <h5><i class="fas fa-history me-2"></i>完整维修记录</h5>
                <p>维修过程可追溯，经验知识沉淀</p>
            </div>
        </div>
        
        <!-- 图片 5：质量验收检测 -->
        <div class="carousel-item">
            <img src="https://images.unsplash.com/photo-1581093583449-ed25213445e6?w=1920&h=600&fit=crop" 
                 alt="质量验收" 
                 onerror="this.src='https://picsum.photos/1920/600?grayscale&random=44'">
            <div class="carousel-caption">
                <h5><i class="fas fa-check-circle me-2"></i>严格质量验收</h5>
                <p>多层级验收标准，确保维修质量</p>
            </div>
        </div>
        
        <!-- 图片 6：维修绩效分析 -->
        <div class="carousel-item">
            <img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=1920&h=600&fit=crop" 
                 alt="绩效分析" 
                 onerror="this.src='https://picsum.photos/1920/600?grayscale&random=45'">
            <div class="carousel-caption">
                <h5><i class="fas fa-chart-line me-2"></i>维修绩效分析</h5>
                <p>MTTR/MTBF 指标，持续改进维修效率</p>
            </div>
        </div>
    </div>
    
    <button class="carousel-control-prev" type="button" data-bs-target="#maintenanceCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#maintenanceCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
    </button>
</div>
