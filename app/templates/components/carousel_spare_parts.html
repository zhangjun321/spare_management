<!-- 备件管理轮播图 -->
<div id="sparePartsCarousel" class="carousel slide carousel-section" data-bs-ride="carousel">
    <div class="carousel-indicators">
        <button type="button" data-bs-target="#sparePartsCarousel" data-bs-slide-to="0" class="active"></button>
        <button type="button" data-bs-target="#sparePartsCarousel" data-bs-slide-to="1"></button>
        <button type="button" data-bs-target="#sparePartsCarousel" data-bs-slide-to="2"></button>
        <button type="button" data-bs-target="#sparePartsCarousel" data-bs-slide-to="3"></button>
        <button type="button" data-bs-target="#sparePartsCarousel" data-bs-slide-to="4"></button>
        <button type="button" data-bs-target="#sparePartsCarousel" data-bs-slide-to="5"></button>
    </div>
    
    <div class="carousel-inner">
        <!-- 图片 1：现代化智能仓储 -->
        <div class="carousel-item active">
            <img src="https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?w=1920&h=600&fit=crop" 
                 alt="智能仓储" 
                 onerror="this.src='https://picsum.photos/1920/600?grayscale&random=1'">
            <div class="carousel-caption">
                <h5><i class="fas fa-boxes me-2"></i>备件库存管理</h5>
                <p>全面管理备件信息，实时掌握库存动态</p>
            </div>
        </div>
        
        <!-- 图片 2：条码扫描与分类 -->
        <div class="carousel-item">
            <img src="https://images.unsplash.com/photo-1605788102039-7908548a50ea?w=1920&h=600&fit=crop" 
                 alt="条码扫描" 
                 onerror="this.src='https://picsum.photos/1920/600?grayscale&random=2'">
            <div class="carousel-caption">
                <h5><i class="fas fa-tags me-2"></i>科学分类体系</h5>
                <p>多级分类管理，快速定位所需备件</p>
            </div>
        </div>
        
        <!-- 图片 3：质检入库 -->
        <div class="carousel-item">
            <img src="https://images.unsplash.com/photo-1565514020176-db936c4f5f7d?w=1920&h=600&fit=crop" 
                 alt="质检入库" 
                 onerror="this.src='https://picsum.photos/1920/600?grayscale&random=3'">
            <div class="carousel-caption">
                <h5><i class="fas fa-dolly me-2"></i>规范入库流程</h5>
                <p>严格质检入库，确保备件品质</p>
            </div>
        </div>
        
        <!-- 图片 4：自动化分拣出库 -->
        <div class="carousel-item">
            <img src="https://images.unsplash.com/photo-1553413077-190dd305871c?w=1920&h=600&fit=crop" 
                 alt="自动化分拣" 
                 onerror="this.src='https://picsum.photos/1920/600?grayscale&random=4'">
            <div class="carousel-caption">
                <h5><i class="fas fa-truck-loading me-2"></i>高效出库管理</h5>
                <p>快速响应需求，精准配货出库</p>
            </div>
        </div>
        
        <!-- 图片 5：二维码追溯 -->
        <div class="carousel-item">
            <img src="https://images.unsplash.com/photo-1628135899946-5a6f43f40056?w=1920&h=600&fit=crop" 
                 alt="二维码追溯" 
                 onerror="this.src='https://picsum.photos/1920/600?grayscale&random=5'">
            <div class="carousel-caption">
                <h5><i class="fas fa-barcode me-2"></i>完整批次追溯</h5>
                <p>一物一码，全生命周期可追溯</p>
            </div>
        </div>
        
        <!-- 图片 6：库存盘点 -->
        <div class="carousel-item">
            <img src="https://images.unsplash.com/photo-1556740714-b83f18f8e9b5?w=1920&h=600&fit=crop" 
                 alt="库存盘点" 
                 onerror="this.src='https://picsum.photos/1920/600?grayscale&random=6'">
            <div class="carousel-caption">
                <h5><i class="fas fa-clipboard-check me-2"></i>定期库存盘点</h5>
                <p>账实相符，确保库存准确性</p>
            </div>
        </div>
    </div>
    
    <button class="carousel-control-prev" type="button" data-bs-target="#sparePartsCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#sparePartsCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
    </button>
</div>
