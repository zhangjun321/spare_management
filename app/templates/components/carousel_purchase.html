<!-- 采购管理轮播图 -->
<div id="purchaseCarousel" class="carousel slide carousel-section" data-bs-ride="carousel">
    <div class="carousel-indicators">
        <button type="button" data-bs-target="#purchaseCarousel" data-bs-slide-to="0" class="active"></button>
        <button type="button" data-bs-target="#purchaseCarousel" data-bs-slide-to="1"></button>
        <button type="button" data-bs-target="#purchaseCarousel" data-bs-slide-to="2"></button>
        <button type="button" data-bs-target="#purchaseCarousel" data-bs-slide-to="3"></button>
        <button type="button" data-bs-target="#purchaseCarousel" data-bs-slide-to="4"></button>
        <button type="button" data-bs-target="#purchaseCarousel" data-bs-slide-to="5"></button>
    </div>
    
    <div class="carousel-inner">
        <!-- 图片 1：采购申请 -->
        <div class="carousel-item active">
            <img src="https://images.unsplash.com/photo-1554224155-6726b4ad4ba5?w=1920&h=600&fit=crop" 
                 alt="采购申请" 
                 onerror="this.src='https://picsum.photos/1920/600?grayscale&random=60'">
            <div class="carousel-caption">
                <h5><i class="fas fa-file-alt me-2"></i>智能采购申请</h5>
                <p>安全库存预警，自动生成采购建议</p>
            </div>
        </div>
        
        <!-- 图片 2：供应商管理 -->
        <div class="carousel-item">
            <img src="https://images.unsplash.com/photo-1556761175-4b73a16f0b99?w=1920&h=600&fit=crop" 
                 alt="供应商管理" 
                 onerror="this.src='https://picsum.photos/1920/600?grayscale&random=61'">
            <div class="carousel-caption">
                <h5><i class="fas fa-handshake me-2"></i>供应商管理</h5>
                <p>供应商评估，优选合作伙伴</p>
            </div>
        </div>
        
        <!-- 图片 3：采购订单 -->
        <div class="carousel-item">
            <img src="https://images.unsplash.com/photo-1554224154-260327c0a989?w=1920&h=600&fit=crop" 
                 alt="采购订单" 
                 onerror="this.src='https://picsum.photos/1920/600?grayscale&random=62'">
            <div class="carousel-caption">
                <h5><i class="fas fa-shopping-bag me-2"></i>采购订单管理</h5>
                <p>订单审批流程，规范采购行为</p>
            </div>
        </div>
        
        <!-- 图片 4：合同管理 -->
        <div class="carousel-item">
            <img src="https://images.unsplash.com/photo-1589829545457-d481f0517286?w=1920&h=600&fit=crop" 
                 alt="合同管理" 
                 onerror="this.src='https://picsum.photos/1920/600?grayscale&random=63'">
            <div class="carousel-caption">
                <h5><i class="fas fa-file-contract me-2"></i>采购合同管理</h5>
                <p>合同电子归档，履约跟踪</p>
            </div>
        </div>
        
        <!-- 图片 5：到货验收 -->
        <div class="carousel-item">
            <img src="https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?w=1920&h=600&fit=crop" 
                 alt="到货验收" 
                 onerror="this.src='https://picsum.photos/1920/600?grayscale&random=64'">
            <div class="carousel-caption">
                <h5><i class="fas fa-box-open me-2"></i>到货验收管理</h5>
                <p>严格质检流程，确保物资品质</p>
            </div>
        </div>
        
        <!-- 图片 6：采购分析 -->
        <div class="carousel-item">
            <img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=1920&h=600&fit=crop" 
                 alt="采购分析" 
                 onerror="this.src='https://picsum.photos/1920/600?grayscale&random=65'">
            <div class="carousel-caption">
                <h5><i class="fas fa-chart-bar me-2"></i>采购成本分析</h5>
                <p>价格趋势分析，降低采购成本</p>
            </div>
        </div>
    </div>
    
    <button class="carousel-control-prev" type="button" data-bs-target="#purchaseCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#purchaseCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
    </button>
</div>
