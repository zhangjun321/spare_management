<!-- 仪表盘轮播图 -->
<div id="dashboardCarousel" class="carousel slide carousel-section" data-bs-ride="carousel">
    <div class="carousel-indicators">
        <button type="button" data-bs-target="#dashboardCarousel" data-bs-slide-to="0" class="active"></button>
        <button type="button" data-bs-target="#dashboardCarousel" data-bs-slide-to="1"></button>
        <button type="button" data-bs-target="#dashboardCarousel" data-bs-slide-to="2"></button>
        <button type="button" data-bs-target="#dashboardCarousel" data-bs-slide-to="3"></button>
        <button type="button" data-bs-target="#dashboardCarousel" data-bs-slide-to="4"></button>
        <button type="button" data-bs-target="#dashboardCarousel" data-bs-slide-to="5"></button>
    </div>
    
    <div class="carousel-inner">
        <!-- 图片 1：现代化智能仓储 -->
        <div class="carousel-item active">
            <img src="https://images.unsplash.com/photo-1587293852726-70cdb56c2866?w=1920&h=600&fit=crop" 
                 alt="智能仓储" 
                 onerror="this.src='https://picsum.photos/1920/600?grayscale&random=10'">
            <div class="carousel-caption">
                <h5><i class="fas fa-warehouse me-2"></i>智能仓储管理</h5>
                <p>实时库存监控，精准库存预警，让备件管理更高效</p>
            </div>
        </div>
        
        <!-- 图片 2：数据可视化大屏 -->
        <div class="carousel-item">
            <img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=1920&h=600&fit=crop" 
                 alt="数据可视化" 
                 onerror="this.src='https://picsum.photos/1920/600?grayscale&random=11'">
            <div class="carousel-caption">
                <h5><i class="fas fa-chart-line me-2"></i>数据分析洞察</h5>
                <p>多维度数据报表，助力科学决策</p>
            </div>
        </div>
        
        <!-- 图片 3：工业设备监控 -->
        <div class="carousel-item">
            <img src="https://images.unsplash.com/photo-1565439398533-3162c594f71b?w=1920&h=600&fit=crop" 
                 alt="设备监控" 
                 onerror="this.src='https://picsum.photos/1920/600?grayscale&random=12'">
            <div class="carousel-caption">
                <h5><i class="fas fa-cogs me-2"></i>设备维护管理</h5>
                <p>预防性维护计划，降低设备故障率</p>
            </div>
        </div>
        
        <!-- 图片 4：供应链采购 -->
        <div class="carousel-item">
            <img src="https://images.unsplash.com/photo-1542744173-8e7e53415bb0?w=1920&h=600&fit=crop" 
                 alt="供应链采购" 
                 onerror="this.src='https://picsum.photos/1920/600?grayscale&random=13'">
            <div class="carousel-caption">
                <h5><i class="fas fa-shopping-cart me-2"></i>智能采购管理</h5>
                <p>自动化采购流程，优化供应商管理</p>
            </div>
        </div>
        
        <!-- 图片 5：团队协作办公 -->
        <div class="carousel-item">
            <img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=1920&h=600&fit=crop" 
                 alt="团队协作" 
                 onerror="this.src='https://picsum.photos/1920/600?grayscale&random=14'">
            <div class="carousel-caption">
                <h5><i class="fas fa-users me-2"></i>高效团队协作</h5>
                <p>工单流转自动化，提升团队工作效率</p>
            </div>
        </div>
        
        <!-- 图片 6：移动办公场景 -->
        <div class="carousel-item">
            <img src="https://images.unsplash.com/photo-1512428559087-560fa5ce7d25?w=1920&h=600&fit=crop" 
                 alt="移动办公" 
                 onerror="this.src='https://picsum.photos/1920/600?grayscale&random=15'">
            <div class="carousel-caption">
                <h5><i class="fas fa-mobile-alt me-2"></i>随时随地管理</h5>
                <p>支持多终端访问，管理工作不受限</p>
            </div>
        </div>
    </div>
    
    <button class="carousel-control-prev" type="button" data-bs-target="#dashboardCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#dashboardCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
    </button>
</div>
