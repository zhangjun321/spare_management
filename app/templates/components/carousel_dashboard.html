<!-- 仓库仪表盘轮播图 - 科技感智能驾驶舱风格 -->
<div id="dashboardCarousel" class="carousel slide carousel-section" data-bs-ride="carousel">
    <div class="carousel-indicators">
        <button type="button" data-bs-target="#dashboardCarousel" data-bs-slide-to="0" class="active"></button>
        <button type="button" data-bs-target="#dashboardCarousel" data-bs-slide-to="1"></button>
        <button type="button" data-bs-target="#dashboardCarousel" data-bs-slide-to="2"></button>
        <button type="button" data-bs-target="#dashboardCarousel" data-bs-slide-to="3"></button>
        <button type="button" data-bs-target="#dashboardCarousel" data-bs-slide-to="4"></button>
        <button type="button" data-bs-target="#dashboardCarousel" data-bs-slide-to="5"></button>
    </div>

    <div class="carousel-inner">
        <!-- 图片 1：数字孪生仓库 -->
        <div class="carousel-item active">
            <img src="/static/images/carousel/dashboard_01.jpg" alt="智能仓库数字孪生" loading="lazy">
            <div class="carousel-caption">
                <h5><i class="fas fa-cube me-2"></i>数字孪生仓库</h5>
                <p>全息数据可视化，实时映射仓储运营全貌</p>
            </div>
        </div>

        <!-- 图片 2：AI智能驾驶舱 -->
        <div class="carousel-item">
            <img src="/static/images/carousel/dashboard_02.jpg" alt="AI智能仓库驾驶舱" loading="lazy">
            <div class="carousel-caption">
                <h5><i class="fas fa-brain me-2"></i>AI 智能驾驶舱</h5>
                <p>多维数据看板，AI 决策辅助仓库高效运营</p>
            </div>
        </div>

        <!-- 图片 3：实时库存监控 -->
        <div class="carousel-item">
            <img src="/static/images/carousel/dashboard_03.jpg" alt="实时库存监控大屏" loading="lazy">
            <div class="carousel-caption">
                <h5><i class="fas fa-boxes me-2"></i>实时库存监控</h5>
                <p>库位状态毫秒级更新，异常库存即时预警</p>
            </div>
        </div>

        <!-- 图片 4：物流流量看板 -->
        <div class="carousel-item">
            <img src="/static/images/carousel/dashboard_04.jpg" alt="出入库物流流量看板" loading="lazy">
            <div class="carousel-caption">
                <h5><i class="fas fa-exchange-alt me-2"></i>物流流量分析</h5>
                <p>出入库动态可视化，供应链全链路追踪</p>
            </div>
        </div>

        <!-- 图片 5：智能预警检测 -->
        <div class="carousel-item">
            <img src="/static/images/carousel/dashboard_05.jpg" alt="智能预警与异常检测" loading="lazy">
            <div class="carousel-caption">
                <h5><i class="fas fa-shield-alt me-2"></i>智能预警检测</h5>
                <p>AI 异常识别引擎，主动预防库存风险</p>
            </div>
        </div>

        <!-- 图片 6：仓库全景俯瞰 -->
        <div class="carousel-item">
            <img src="/static/images/carousel/dashboard_06.jpg" alt="智能仓库数字化全景" loading="lazy">
            <div class="carousel-caption">
                <h5><i class="fas fa-satellite me-2"></i>仓库数字化全景</h5>
                <p>智能仓储全局视图，区域状态一屏掌控</p>
            </div>
        </div>
    </div>

    <button class="carousel-control-prev" type="button" data-bs-target="#dashboardCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#dashboardCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
    </button>
</div>
