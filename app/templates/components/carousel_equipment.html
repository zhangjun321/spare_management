<!-- 设备管理轮播图 -->
<div id="equipmentCarousel" class="carousel slide carousel-section" data-bs-ride="carousel">
    <div class="carousel-indicators">
        <button type="button" data-bs-target="#equipmentCarousel" data-bs-slide-to="0" class="active"></button>
        <button type="button" data-bs-target="#equipmentCarousel" data-bs-slide-to="1"></button>
        <button type="button" data-bs-target="#equipmentCarousel" data-bs-slide-to="2"></button>
        <button type="button" data-bs-target="#equipmentCarousel" data-bs-slide-to="3"></button>
        <button type="button" data-bs-target="#equipmentCarousel" data-bs-slide-to="4"></button>
        <button type="button" data-bs-target="#equipmentCarousel" data-bs-slide-to="5"></button>
    </div>
    
    <div class="carousel-inner">
        <!-- 图片 1：工业设备档案 -->
        <div class="carousel-item active">
            <img src="/static/images/carousel/equipment_01.jpg" alt="equipment 图片1" loading="lazy">
            <div class="carousel-caption">
                <h5><i class="fas fa-folder-open me-2"></i>完整设备档案</h5>
                <p>一机一档，记录设备全生命周期信息</p>
            </div>
        </div>
        
        <!-- 图片 2：设备运行监控大屏 -->
        <div class="carousel-item">
            <img src="/static/images/carousel/equipment_02.jpg" alt="equipment 图片2" loading="lazy">
            <div class="carousel-caption">
                <h5><i class="fas fa-tachometer-alt me-2"></i>实时运行监控</h5>
                <p>设备状态实时追踪，异常及时预警</p>
            </div>
        </div>
        
        <!-- 图片 3：预防性保养 -->
        <div class="carousel-item">
            <img src="/static/images/carousel/equipment_03.jpg" alt="equipment 图片3" loading="lazy">
            <div class="carousel-caption">
                <h5><i class="fas fa-calendar-check me-2"></i>预防性保养</h5>
                <p>定期保养计划，延长设备使用寿命</p>
            </div>
        </div>
        
        <!-- 图片 4：设备点巡检 -->
        <div class="carousel-item">
            <img src="/static/images/carousel/equipment_04.jpg" alt="equipment 图片4" loading="lazy">
            <div class="carousel-caption">
                <h5><i class="fas fa-clipboard-list me-2"></i>规范点巡检</h5>
                <p>标准化巡检流程，及时发现隐患</p>
            </div>
        </div>
        
        <!-- 图片 5：设备故障分析 -->
        <div class="carousel-item">
            <img src="/static/images/carousel/equipment_05.jpg" alt="equipment 图片5" loading="lazy">
            <div class="carousel-caption">
                <h5><i class="fas fa-chart-pie me-2"></i>故障统计分析</h5>
                <p>故障趋势分析，指导预防维护</p>
            </div>
        </div>
        
        <!-- 图片 6：设备备件关联 -->
        <div class="carousel-item">
            <img src="/static/images/carousel/equipment_06.jpg" alt="equipment 图片6" loading="lazy">
            <div class="carousel-caption">
                <h5><i class="fas fa-link me-2"></i>设备备件关联</h5>
                <p>易损件清单管理，备件需求预测</p>
            </div>
        </div>
    </div>
    
    <button class="carousel-control-prev" type="button" data-bs-target="#equipmentCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#equipmentCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
    </button>
</div>
