
{% extends "base.html" %}

{% block title %}{% block page_title %}工业设备维护管理{% endblock %}{% endblock %}

{% block extra_css %}
<style>
    .industrial-card {
        transition: all 0.3s ease;
        border-radius: 12px;
        box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
    }
    
    .industrial-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
    }
    
    .status-badge {
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
    }
    
    .status-active {
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        color: white;
    }
    
    .status-maintenance {
        background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        color: white;
    }
    
    .status-error {
        background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        color: white;
    }
    
    .status-warning {
        background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
        color: white;
    }
    
    .status-critical {
        background: linear-gradient(135deg, #7f1d1d 0%, #ef4444 100%);
        color: white;
    }
    
    .priority-high {
        background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        color: white;
    }
    
    .priority-medium {
        background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        color: white;
    }
    
    .priority-low {
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        color: white;
    }
    
    .progress-health {
        background: linear-gradient(90deg, #10b981, #059669);
    }
    
    .progress-warning {
        background: linear-gradient(90deg, #f59e0b, #d97706);
    }
    
    .progress-danger {
        background: linear-gradient(90deg, #ef4444, #dc2626);
    }
    
    .nav-link-industrial {
        padding: 10px 16px;
        border-radius: 8px;
        color: #4b5563;
        font-weight: 500;
        transition: all 0.3s ease;
    }
    
    .nav-link-industrial:hover,
    .nav-link-industrial.active {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
    }
    
    .quick-action-btn {
        padding: 12px 16px;
        border-radius: 10px;
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        transition: all 0.3s ease;
        text-decoration: none;
        color: #374151;
    }
    
    .quick-action-btn:hover {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        transform: translateY(-2px);
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
    }
</style>
{% endblock %}

{% block content %}
<div class="container-fluid">
    <!-- 工业设备顶部导航 -->
    <div class="mb-4">
        <div class="d-flex flex-wrap gap-2 mb-3">
            <a href="{{ url_for('industrial_pages.dashboard') }}" 
               class="nav-link-industrial {% if request.path == '/industrial/dashboard' %}active{% endif %}">
                <i class="fas fa-tachometer-alt me-2"></i>仪表盘
            </a>
            <a href="{{ url_for('industrial_pages.devices') }}" 
               class="nav-link-industrial {% if request.path.startswith('/industrial/devices') %}active{% endif %}">
                <i class="fas fa-industry me-2"></i>设备管理
            </a>
            <a href="{{ url_for('industrial_pages.alerts') }}" 
               class="nav-link-industrial {% if request.path.startswith('/industrial/alerts') %}active{% endif %}">
                <i class="fas fa-bell me-2"></i>告警中心
            </a>
            <a href="{{ url_for('industrial_pages.work_orders') }}" 
               class="nav-link-industrial {% if request.path.startswith('/industrial/work-orders') %}active{% endif %}">
                <i class="fas fa-clipboard-list me-2"></i>工单管理
            </a>
            <a href="{{ url_for('industrial_pages.knowledge_base') }}" 
               class="nav-link-industrial {% if request.path.startswith('/industrial/knowledge-base') %}active{% endif %}">
                <i class="fas fa-book me-2"></i>知识库
            </a>
            <a href="{{ url_for('industrial_pages.spare_parts') }}" 
               class="nav-link-industrial {% if request.path.startswith('/industrial/spare-parts') %}active{% endif %}">
                <i class="fas fa-tools me-2"></i>备件管理
            </a>
            <a href="{{ url_for('industrial_pages.maintenance_plans') }}" 
               class="nav-link-industrial {% if request.path.startswith('/industrial/maintenance-plans') %}active{% endif %}">
                <i class="fas fa-calendar-check me-2"></i>维护计划
            </a>
            <a href="{{ url_for('industrial_pages.components') }}" 
               class="nav-link-industrial {% if request.path.startswith('/industrial/components') %}active{% endif %}">
                <i class="fas fa-microchip me-2"></i>组件管理
            </a>
        </div>
    </div>
    
    <!-- 主内容区 -->
    {% block industrial_content %}{% endblock %}
</div>
{% endblock %}
