{% extends "base.html" %}

{% block title %}库存概览 - 仓库管理系统{% endblock %}

{% block page_title %}库存概览{% endblock %}

{% block content %}
<div id="app">
    <style>
        .search-form {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .data-table {
            background: #fff;
            border-radius: 8px;
            padding: 20px;
        }
    </style>

    {% raw %}
    <div class="search-form">
        <el-form :inline="true" :model="searchForm" class="search-form">
            <el-form-item label="仓库">
                <el-select v-model="searchForm.warehouse_id" placeholder="请选择" clearable>
                    <el-option v-for="wh in warehouses" :key="wh.id" :label="wh.name" :value="wh.id"></el-option>
                </el-select>
            </el-form-item>
            <el-form-item label="备件类型">
                <el-select v-model="searchForm.category" placeholder="请选择" clearable>
                    <el-option label="电子元件" value="electronics"></el-option>
                    <el-option label="机械零件" value="mechanical"></el-option>
                    <el-option label="耗材" value="consumables"></el-option>
                </el-select>
            </el-form-item>
            <el-form-item label="库存状态">
                <el-select v-model="searchForm.status" placeholder="请选择" clearable>
                    <el-option label="充足" value="sufficient"></el-option>
                    <el-option label="不足" value="low"></el-option>
                    <el-option label="缺货" value="out_of_stock"></el-option>
                </el-select>
            </el-form-item>
            <el-form-item>
                <el-button type="primary" @click="handleSearch">查询</el-button>
                <el-button @click="handleReset">重置</el-button>
            </el-form-item>
        </el-form>
    </div>

    <div class="data-table">
        <el-table :data="tableData" border stripe style="width: 100%" v-loading="loading">
            <el-table-column prop="id" label="ID" width="80"></el-table-column>
            <el-table-column prop="warehouse_name" label="仓库名称" width="150"></el-table-column>
            <el-table-column prop="spare_part_name" label="备件名称" width="200"></el-table-column>
            <el-table-column prop="category" label="类型" width="100">
                <template #default="scope">
                    <el-tag :type="getCategoryTag(scope.row.category)">
                        {{ scope.row.category }}
                    </el-tag>
                </template>
            </el-table-column>
            <el-table-column prop="quantity" label="库存数量" width="100"></el-table-column>
            <el-table-column prop="min_quantity" label="最低库存" width="100"></el-table-column>
            <el-table-column prop="max_quantity" label="最高库存" width="100"></el-table-column>
            <el-table-column prop="status" label="状态" width="100">
                <template #default="scope">
                    <el-tag :type="getStatusTag(scope.row.status)">
                        {{ getStatusText(scope.row.status) }}
                    </el-tag>
                </template>
            </el-table-column>
            <el-table-column prop="last_updated" label="最后更新" width="180"></el-table-column>
            <el-table-column label="操作" fixed="right" width="200">
                <template #default="scope">
                    <el-button size="small" type="primary" @click="handleView(scope.row)">查看</el-button>
                    <el-button size="small" type="warning" @click="handleAdjust(scope.row)">调整</el-button>
                </template>
            </el-table-column>
        </el-table>

        <el-pagination
            v-model:current-page="pagination.page"
            v-model:page-size="pagination.per_page"
            :total="pagination.total"
            :page-sizes="[10, 20, 50, 100]"
            layout="total, sizes, prev, pager, next, jumper"
            @size-change="handleSizeChange"
            @current-change="handlePageChange"
            style="margin-top: 20px; justify-content: flex-end;"
        />
    </div>
    {% endraw %}
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.4.2/dist/index.css">
<script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/element-plus@2.4.2/dist/index.full.min.js"></script>

<script>
const { createApp } = Vue;

createApp({
    data() {
        return {
            loading: false,
            warehouses: [],
            searchForm: {
                warehouse_id: '',
                category: '',
                status: ''
            },
            tableData: [],
            pagination: {
                page: 1,
                per_page: 20,
                total: 0
            }
        };
    },
    methods: {
        async loadWarehouses() {
            try {
                const response = await fetch('/api/warehouse/list');
                const data = await response.json();
                if (data.success) {
                    this.warehouses = data.data || [];
                }
            } catch (error) {
                console.error('加载仓库列表失败:', error);
            }
        },
        async loadData() {
            this.loading = true;
            try {
                const params = new URLSearchParams({
                    page: this.pagination.page,
                    per_page: this.pagination.per_page,
                    ...this.searchForm
                });
                
                const response = await fetch(`/api/warehouse/inventory/list?${params}`);
                const data = await response.json();
                
                if (data.success) {
                    this.tableData = data.data.items || [];
                    this.pagination.total = data.data.total || 0;
                } else {
                    this.$message.error('加载数据失败');
                }
            } catch (error) {
                console.error('加载数据失败:', error);
                this.$message.error('加载数据失败');
            } finally {
                this.loading = false;
            }
        },
        handleSearch() {
            this.pagination.page = 1;
            this.loadData();
        },
        handleReset() {
            this.searchForm = {
                warehouse_id: '',
                category: '',
                status: ''
            };
            this.pagination.page = 1;
            this.loadData();
        },
        handleSizeChange(size) {
            this.pagination.per_page = size;
            this.pagination.page = 1;
            this.loadData();
        },
        handlePageChange(page) {
            this.pagination.page = page;
            this.loadData();
        },
        getCategoryTag(category) {
            const tags = {
                'electronics': 'primary',
                'mechanical': 'success',
                'consumables': 'warning'
            };
            return tags[category] || 'info';
        },
        getStatusTag(status) {
            const tags = {
                'sufficient': 'success',
                'low': 'warning',
                'out_of_stock': 'danger'
            };
            return tags[status] || 'info';
        },
        getStatusText(status) {
            const texts = {
                'sufficient': '充足',
                'low': '不足',
                'out_of_stock': '缺货'
            };
            return texts[status] || status;
        },
        handleView(row) {
            this.$message.info('查看功能开发中');
        },
        handleAdjust(row) {
            this.$message.info('调整功能开发中');
        }
    },
    mounted() {
        this.loadWarehouses();
        this.loadData();
    }
}).use(ElementPlus).mount('#app');
</script>
{% endblock %}
