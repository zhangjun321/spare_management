{% extends "base.html" %}

{% block title %}出库管理 - 仓库管理系统{% endblock %}

{% block page_title %}出库管理{% endblock %}

{% block content %}
<div id="app">
    <style>
        .search-form {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .data-table {
            background: #fff;
            border-radius: 8px;
            padding: 20px;
        }
    </style>

    {% raw %}
    <div class="search-form">
        <el-form :inline="true" :model="searchForm" class="search-form">
            <el-form-item label="出库类型">
                <el-select v-model="searchForm.outbound_type" placeholder="请选择" clearable>
                    <el-option label="销售出库" value="sales"></el-option>
                    <el-option label="调拨出库" value="transfer"></el-option>
                    <el-option label="报废出库" value="scrap"></el-option>
                    <el-option label="其他出库" value="other"></el-option>
                </el-select>
            </el-form-item>
            <el-form-item label="状态">
                <el-select v-model="searchForm.status" placeholder="请选择" clearable>
                    <el-option label="待处理" value="pending"></el-option>
                    <el-option label="处理中" value="processing"></el-option>
                    <el-option label="已完成" value="completed"></el-option>
                    <el-option label="已取消" value="cancelled"></el-option>
                </el-select>
            </el-form-item>
            <el-form-item>
                <el-button type="primary" @click="handleSearch">查询</el-button>
                <el-button @click="handleReset">重置</el-button>
            </el-form-item>
        </el-form>
    </div>

    <div class="data-table">
        <el-table :data="tableData" border stripe style="width: 100%" v-loading="loading">
            <el-table-column prop="order_no" label="出库单号" width="180"></el-table-column>
            <el-table-column prop="outbound_type" label="出库类型" width="120">
                <template #default="scope">
                    <el-tag :type="getOutboundTypeTag(scope.row.outbound_type)">
                        {{ getOutboundTypeText(scope.row.outbound_type) }}
                    </el-tag>
                </template>
            </el-table-column>
            <el-table-column prop="spare_part_id" label="备件 ID" width="100"></el-table-column>
            <el-table-column prop="warehouse_id" label="仓库 ID" width="100"></el-table-column>
            <el-table-column prop="quantity" label="出库数量" width="100"></el-table-column>
            <el-table-column prop="actual_quantity" label="实发数量" width="100"></el-table-column>
            <el-table-column prop="status" label="状态" width="100">
                <template #default="scope">
                    <el-tag :type="getStatusTag(scope.row.status)">
                        {{ getStatusText(scope.row.status) }}
                    </el-tag>
                </template>
            </el-table-column>
            <el-table-column prop="created_at" label="创建时间" width="180"></el-table-column>
            <el-table-column label="操作" fixed="right" width="200">
                <template #default="scope">
                    <el-button size="small" type="primary" @click="handleView(scope.row)">查看</el-button>
                    <el-button size="small" type="success" @click="handleEdit(scope.row)">编辑</el-button>
                </template>
            </el-table-column>
        </el-table>

        <el-pagination
            v-model:current-page="pagination.page"
            v-model:page-size="pagination.per_page"
            :total="pagination.total"
            :page-sizes="[10, 20, 50, 100]"
            layout="total, sizes, prev, pager, next, jumper"
            @size-change="handleSizeChange"
            @current-change="handlePageChange"
            style="margin-top: 20px; justify-content: flex-end;"
        />
    </div>
    {% endraw %}
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.4.2/dist/index.css">
<script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/element-plus@2.4.2/dist/index.full.min.js"></script>

<script>
const { createApp } = Vue;

createApp({
    data() {
        return {
            loading: false,
            searchForm: {
                outbound_type: '',
                status: ''
            },
            tableData: [],
            pagination: {
                page: 1,
                per_page: 20,
                total: 0
            }
        };
    },
    methods: {
        async loadData() {
            this.loading = true;
            try {
                const params = new URLSearchParams({
                    page: this.pagination.page,
                    per_page: this.pagination.per_page,
                    ...this.searchForm
                });
                
                const response = await fetch(`/api/warehouse/outbound/list?${params}`);
                const data = await response.json();
                
                if (data.success) {
                    this.tableData = data.data.items || [];
                    this.pagination.total = data.data.total || 0;
                } else {
                    this.$message.error('加载数据失败');
                }
            } catch (error) {
                console.error('加载数据失败:', error);
                this.$message.error('加载数据失败');
            } finally {
                this.loading = false;
            }
        },
        handleSearch() {
            this.pagination.page = 1;
            this.loadData();
        },
        handleReset() {
            this.searchForm = {
                outbound_type: '',
                status: ''
            };
            this.pagination.page = 1;
            this.loadData();
        },
        handleSizeChange(size) {
            this.pagination.per_page = size;
            this.pagination.page = 1;
            this.loadData();
        },
        handlePageChange(page) {
            this.pagination.page = page;
            this.loadData();
        },
        getOutboundTypeTag(type) {
            const tags = {
                'sales': 'primary',
                'transfer': 'success',
                'scrap': 'danger',
                'other': 'info'
            };
            return tags[type] || 'info';
        },
        getOutboundTypeText(type) {
            const texts = {
                'sales': '销售出库',
                'transfer': '调拨出库',
                'scrap': '报废出库',
                'other': '其他出库'
            };
            return texts[type] || type;
        },
        getStatusTag(status) {
            const tags = {
                'pending': 'warning',
                'processing': 'primary',
                'completed': 'success',
                'cancelled': 'danger'
            };
            return tags[status] || 'info';
        },
        getStatusText(status) {
            const texts = {
                'pending': '待处理',
                'processing': '处理中',
                'completed': '已完成',
                'cancelled': '已取消'
            };
            return texts[status] || status;
        },
        handleView(row) {
            this.$message.info('查看功能开发中');
        },
        handleEdit(row) {
            this.$message.info('编辑功能开发中');
        }
    },
    mounted() {
        this.loadData();
    }
}).use(ElementPlus).mount('#app');
</script>
{% endblock %}
