<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>入库管理 - 仓库管理系统</title>
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.4.2/dist/index.css">
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: #f5f7fa;
            padding: 20px;
        }
        .page-header {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .search-form {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .data-table {
            background: #fff;
            border-radius: 8px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="page-header">
            <h2>📥 入库管理</h2>
            <el-button type="primary" @click="createInbound">新建入库单</el-button>
        </div>

        <div class="search-form">
            <el-form :inline="true" :model="searchForm" class="search-form">
                <el-form-item label="入库类型">
                    <el-select v-model="searchForm.inbound_type" placeholder="请选择" clearable>
                        <el-option label="采购入库" value="purchase"></el-option>
                        <el-option label="退货入库" value="return"></el-option>
                        <el-option label="调拨入库" value="transfer"></el-option>
                        <el-option label="其他入库" value="other"></el-option>
                    </el-select>
                </el-form-item>
                <el-form-item label="状态">
                    <el-select v-model="searchForm.status" placeholder="请选择" clearable>
                        <el-option label="待入库" value="pending"></el-option>
                        <el-option label="部分入库" value="partial"></el-option>
                        <el-option label="已完成" value="completed"></el-option>
                        <el-option label="已取消" value="cancelled"></el-option>
                    </el-select>
                </el-form-item>
                <el-form-item>
                    <el-button type="primary" @click="search">查询</el-button>
                    <el-button @click="reset">重置</el-button>
                </el-form-item>
            </el-form>
        </div>

        <div class="data-table">
            <el-table :data="tableData" v-loading="loading" style="width: 100%">
                <el-table-column prop="order_no" label="入库单号" width="180"></el-table-column>
                <el-table-column prop="inbound_type" label="入库类型" width="120">
                    <template #default="scope">
                        <el-tag>${ getTypeLabel(scope.row.inbound_type) }</el-tag>
                    </template>
                </el-table-column>
                <el-table-column prop="spare_part_id" label="备件 ID" width="100"></el-table-column>
                <el-table-column prop="warehouse_id" label="仓库 ID" width="100"></el-table-column>
                <el-table-column prop="quantity" label="入库数量" width="100"></el-table-column>
                <el-table-column prop="received_quantity" label="实收数量" width="100"></el-table-column>
                <el-table-column prop="status" label="状态" width="100">
                    <template #default="scope">
                        <el-tag :type="getStatusType(scope.row.status)">
                            ${ getStatusLabel(scope.row.status) }
                        </el-tag>
                    </template>
                </el-table-column>
                <el-table-column prop="created_at" label="创建时间" width="180"></el-table-column>
                <el-table-column label="操作" fixed="right" width="200">
                    <template #default="scope">
                        <el-button size="small" @click="viewDetail(scope.row)">详情</el-button>
                        <el-button size="small" type="success" v-if="scope.row.status === 'pending'" @click="completeInbound(scope.row)">完成入库</el-button>
                        <el-button size="small" type="danger" v-if="scope.row.status !== 'completed' && scope.row.status !== 'cancelled'" @click="cancelInbound(scope.row)">取消</el-button>
                    </template>
                </el-table-column>
            </el-table>
            
            <el-pagination
                v-model:current-page="pagination.page"
                v-model:page-size="pagination.per_page"
                :page-sizes="[10, 20, 50, 100]"
                :total="pagination.total"
                layout="total, sizes, prev, pager, next, jumper"
                @size-change="loadData"
                @current-change="loadData"
                style="margin-top: 20px; justify-content: center;">
            </el-pagination>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@3.3.4/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/element-plus@2.4.2/dist/index.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.2/dist/axios.min.js"></script>
    
    <script>
    /* eslint-disable */
    /* jshint ignore:start */
        // 配置 CSRF token
        const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
        axios.defaults.headers.common['X-CSRFToken'] = csrfToken;
        axios.defaults.headers.post['Content-Type'] = 'application/json';
        const { createApp, ref, onMounted } = Vue;
        
        createApp({
            delimiters: ['${', '}'],
            setup() {
                const loading = ref(false);
                const tableData = ref([]);
                const searchForm = ref({
                    inbound_type: '',
                    status: ''
                });
                const pagination = ref({
                    page: 1,
                    per_page: 20,
                    total: 0
                });
                
                const loadData = async () => {
                    loading.value = true;
                    try {
                        const params = {
                            page: pagination.value.page,
                            per_page: pagination.value.per_page,
                            ...searchForm.value
                        };
                        // 统一走当前已启用的入库 API
                        const response = await axios.get('/api/inbound/orders', { params });
                        if (response.data.success) {
                            tableData.value = response.data.data.items;
                            pagination.value.total = response.data.data.total;
                        }
                    } catch (error) {
                        ElementPlus.ElMessage.error('加载数据失败');
                    }
                    loading.value = false;
                };
                
                const search = () => {
                    pagination.value.page = 1;
                    loadData();
                };
                
                const reset = () => {
                    searchForm.value = { inbound_type: '', status: '' };
                    search();
                };
                
                const createInbound = () => {
                    window.location.href = '/warehouse/inbound/create';
                };
                
                const viewDetail = (row) => {
                    window.location.href = `/warehouse/inbound/${row.id}`;
                };
                
                const completeInbound = async (row) => {
                    try {
                        await ElementPlus.ElMessageBox.confirm('确定要完成入库吗？', '提示', { type: 'warning' });
                        const response = await axios.post(`/api/inbound/orders/${row.id}/complete`);
                        if (response.data.success) {
                            ElementPlus.ElMessage.success('入库完成');
                            loadData();
                        } else {
                            ElementPlus.ElMessage.error(response.data.error);
                        }
                    } catch (error) {
                        if (error !== 'cancel') {
                            ElementPlus.ElMessage.error('操作失败');
                        }
                    }
                };
                
                const cancelInbound = async (row) => {
                    try {
                        await ElementPlus.ElMessageBox.confirm('确定要取消入库单吗？', '提示', { type: 'warning' });
                        const response = await axios.post(`/api/inbound/orders/${row.id}/cancel`);
                        if (response.data.success) {
                            ElementPlus.ElMessage.success('已取消');
                            loadData();
                        } else {
                            ElementPlus.ElMessage.error(response.data.error);
                        }
                    } catch (error) {
                        if (error !== 'cancel') {
                            ElementPlus.ElMessage.error('操作失败');
                        }
                    }
                };
                
                const getTypeLabel = (type) => {
                    const map = { purchase: '采购入库', return: '退货入库', transfer: '调拨入库', other: '其他入库' };
                    return map[type] || type;
                };
                
                const getStatusLabel = (status) => {
                    const map = { pending: '待入库', partial: '部分入库', completed: '已完成', cancelled: '已取消' };
                    return map[status] || status;
                };
                
                const getStatusType = (status) => {
                    const map = { pending: 'warning', partial: 'info', completed: 'success', cancelled: 'danger' };
                    return map[status] || '';
                };
                
                onMounted(() => {
                    loadData();
                });
                
                return {
                    loading,
                    tableData,
                    searchForm,
                    pagination,
                    search,
                    reset,
                    createInbound,
                    viewDetail,
                    completeInbound,
                    cancelInbound,
                    getTypeLabel,
                    getStatusLabel,
                    getStatusType,
                    loadData
                };
            }
        }).use(ElementPlus).mount('#app');
    /* jshint ignore:end */
    </script>
</body>
</html>
