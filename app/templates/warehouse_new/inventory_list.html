<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>库存管理 - 仓库管理系统</title>
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.4.2/dist/index.css">
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: #f5f7fa;
            padding: 20px;
        }
        .page-header {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .search-form {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .data-table {
            background: #fff;
            border-radius: 8px;
            padding: 20px;
        }
        .stat-card {
            background: #fff;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-around;
        }
        .stat-item {
            text-align: center;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .stat-label {
            font-size: 14px;
            color: #909399;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="page-header">
            <h2>📦 库存管理</h2>
            <el-button type="primary" @click="refreshData">刷新</el-button>
        </div>

        <!-- 统计卡片 -->
        <div class="stat-card">
            <div class="stat-item">
                <div class="stat-value" style="color: #67C23A">${ stats.total }</div>
                <div class="stat-label">总库存品种</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" style="color: #E6A23C">${ stats.lowStock }</div>
                <div class="stat-label">低库存</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" style="color: #F56C6C">${ stats.outOfStock }</div>
                <div class="stat-label">缺货</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" style="color: #909399">${ stats.normal }</div>
                <div class="stat-label">正常</div>
            </div>
        </div>

        <div class="search-form">
            <el-form :inline="true" :model="searchForm" class="search-form">
                <el-form-item label="库存状态">
                    <el-select v-model="searchForm.stock_status" placeholder="请选择" clearable>
                        <el-option label="正常" value="normal"></el-option>
                        <el-option label="低库存" value="low"></el-option>
                        <el-option label="缺货" value="out"></el-option>
                        <el-option label="超储" value="overstocked"></el-option>
                    </el-select>
                </el-form-item>
                <el-form-item label="只显示有库存">
                    <el-switch v-model="searchForm.has_stock" active-value="true"></el-switch>
                </el-form-item>
                <el-form-item>
                    <el-button type="primary" @click="search">查询</el-button>
                    <el-button @click="reset">重置</el-button>
                </el-form-item>
            </el-form>
        </div>

        <div class="data-table">
            <el-table :data="tableData" v-loading="loading" style="width: 100%">
                <el-table-column prop="id" label="ID" width="80"></el-table-column>
                <el-table-column prop="spare_part_id" label="备件 ID" width="100"></el-table-column>
                <el-table-column prop="warehouse_id" label="仓库 ID" width="100"></el-table-column>
                <el-table-column prop="location_id" label="货位 ID" width="100"></el-table-column>
                <el-table-column prop="quantity" label="库存数量" width="100"></el-table-column>
                <el-table-column prop="available_quantity" label="可用数量" width="100"></el-table-column>
                <el-table-column prop="locked_quantity" label="锁定数量" width="100"></el-table-column>
                <el-table-column prop="stock_status" label="库存状态" width="100">
                    <template #default="scope">
                        <el-tag :type="getStatusType(scope.row.stock_status)">
                            ${ getStatusLabel(scope.row.stock_status) }
                        </el-tag>
                    </template>
                </el-table-column>
                <el-table-column prop="batch_number" label="批次号" width="150"></el-table-column>
                <el-table-column prop="updated_at" label="最后更新时间" width="180"></el-table-column>
                <el-table-column label="操作" fixed="right" width="150">
                    <template #default="scope">
                        <el-button size="small" @click="viewDetail(scope.row)">详情</el-button>
                        <el-button size="small" type="primary" @click="viewDistribution(scope.row)">分布</el-button>
                    </template>
                </el-table-column>
            </el-table>
            
            <el-pagination
                v-model:current-page="pagination.page"
                v-model:page-size="pagination.per_page"
                :page-sizes="[10, 20, 50, 100]"
                :total="pagination.total"
                layout="total, sizes, prev, pager, next, jumper"
                @size-change="loadData"
                @current-change="loadData"
                style="margin-top: 20px; justify-content: center;">
            </el-pagination>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@3.3.4/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/element-plus@2.4.2/dist/index.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.2/dist/axios.min.js"></script>
    
    <script>
    /* eslint-disable */
    /* jshint ignore:start */
        // 配置 CSRF token
        const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
        axios.defaults.headers.common['X-CSRFToken'] = csrfToken;
        axios.defaults.headers.post['Content-Type'] = 'application/json';
        const { createApp, ref, onMounted } = Vue;
        
        createApp({
            delimiters: ['${', '}'],
            setup() {
                const loading = ref(false);
                const tableData = ref([]);
                const stats = ref({
                    total: 0,
                    lowStock: 0,
                    outOfStock: 0,
                    normal: 0
                });
                const searchForm = ref({
                    stock_status: '',
                    has_stock: ''
                });
                const pagination = ref({
                    page: 1,
                    per_page: 20,
                    total: 0
                });
                
                const loadData = async () => {
                    loading.value = true;
                    try {
                        const params = {
                            page: pagination.value.page,
                            per_page: pagination.value.per_page,
                            ...searchForm.value
                        };
                        const response = await axios.get('/api/warehouse/inventory/list', { params });
                        if (response.data.success) {
                            tableData.value = response.data.data.items;
                            pagination.value.total = response.data.data.total;
                            
                            // 更新统计
                            stats.value.total = response.data.data.total;
                        }
                    } catch (error) {
                        ElementPlus.ElMessage.error('加载数据失败');
                    }
                    loading.value = false;
                };
                
                const loadStats = async () => {
                    try {
                        const [lowRes, outRes, normalRes] = await Promise.all([
                            axios.get('/api/warehouse/inventory/list', { params: { page: 1, per_page: 1, stock_status: 'low' } }),
                            axios.get('/api/warehouse/inventory/list', { params: { page: 1, per_page: 1, stock_status: 'out' } }),
                            axios.get('/api/warehouse/inventory/list', { params: { page: 1, per_page: 1, stock_status: 'normal' } })
                        ]);
                        
                        stats.value.lowStock = lowRes.data.data.total;
                        stats.value.outOfStock = outRes.data.data.total;
                        stats.value.normal = normalRes.data.data.total;
                    } catch (error) {
                        console.error('加载统计失败:', error);
                    }
                };
                
                const search = () => {
                    pagination.value.page = 1;
                    loadData();
                };
                
                const reset = () => {
                    searchForm.value = { stock_status: '', has_stock: '' };
                    search();
                };
                
                const viewDetail = (row) => {
                    window.location.href = `/warehouse/inventory/${row.id}`;
                };
                
                const viewDistribution = (row) => {
                    window.location.href = `/warehouse/inventory/${row.id}/distribution`;
                };
                
                const getStatusLabel = (status) => {
                    const map = { normal: '正常', low: '低库存', out: '缺货', overstocked: '超储', locked: '锁定' };
                    return map[status] || status;
                };
                
                const getStatusType = (status) => {
                    const map = { normal: 'success', low: 'warning', out: 'danger', overstocked: 'info', locked: 'warning' };
                    return map[status] || '';
                };
                
                const refreshData = () => {
                    loadData();
                    loadStats();
                    ElementPlus.ElMessage.success('数据已刷新');
                };
                
                onMounted(() => {
                    loadData();
                    loadStats();
                });
                
                return {
                    loading,
                    tableData,
                    stats,
                    searchForm,
                    pagination,
                    search,
                    reset,
                    viewDetail,
                    viewDistribution,
                    getStatusLabel,
                    getStatusType,
                    refreshData,
                    loadData
                };
            }
        }).use(ElementPlus).mount('#app');
    /* jshint ignore:end */
    </script>
</body>
</html>
