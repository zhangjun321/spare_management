{% extends "base.html" %}

{% raw %}
<template>
  <div class="warning-management">
    <el-card class="box-card">
      <template #header>
        <div class="card-header">
          <span>预警规则管理</span>
          <el-button type="primary" @click="showCreateDialog">新增规则</el-button>
        </div>
      </template>

      <!-- 预警规则列表 -->
      <el-table :data="rules" style="width: 100%" v-loading="loading">
        <el-table-column prop="id" label="ID" width="80" />
        <el-table-column prop="rule_name" label="规则名称" />
        <el-table-column prop="rule_type" label="规则类型" width="120">
          <template #default="{ row }">
            <el-tag :type="getRuleTypeTag(row.rule_type)">
              {{ getRuleTypeText(row.rule_type) }}
            </el-tag>
          </template>
        </el-table-column>
        <el-table-column label="预警条件" width="200">
          <template #default="{ row }">
            {{ row.condition_field }} {{ getOperatorText(row.condition_operator) }} {{ row.threshold_value }}{{ row.threshold_unit }}
          </template>
        </el-table-column>
        <el-table-column prop="warning_level" label="预警级别" width="100">
          <template #default="{ row }">
            <el-tag :type="getLevelTag(row.warning_level)">
              {{ getLevelText(row.warning_level) }}
            </el-tag>
          </template>
        </el-table-column>
        <el-table-column prop="enabled" label="状态" width="100">
          <template #default="{ row }">
            <el-tag :type="row.enabled ? 'success' : 'info'">
              {{ row.enabled ? '已启用' : '已禁用' }}
            </el-tag>
          </template>
        </el-table-column>
        <el-table-column label="操作" width="250" fixed="right">
          <template #default="{ row }">
            <el-button size="small" @click="toggleRule(row)">
              {{ row.enabled ? '禁用' : '启用' }}
            </el-button>
            <el-button size="small" type="primary" @click="showEditDialog(row)">编辑</el-button>
            <el-button size="small" type="danger" @click="deleteRule(row)">删除</el-button>
          </template>
        </el-table-column>
      </el-table>
    </el-card>

    <el-card class="box-card" style="margin-top: 20px;">
      <template #header>
        <div class="card-header">
          <span>预警日志</span>
          <el-button @click="loadWarningLogs">刷新</el-button>
        </div>
      </template>

      <el-table :data="warningLogs" style="width: 100%" v-loading="logsLoading">
        <el-table-column prop="id" label="ID" width="80" />
        <el-table-column prop="warning_level" label="级别" width="80">
          <template #default="{ row }">
            <el-tag :type="getLevelTag(row.warning_level)">
              {{ getLevelText(row.warning_level) }}
            </el-tag>
          </template>
        </el-table-column>
        <el-table-column prop="warning_content" label="预警内容" show-overflow-tooltip />
        <el-table-column prop="current_value" label="当前值" width="100" />
        <el-table-column prop="threshold_value" label="阈值" width="100" />
        <el-table-column prop="is_read" label="状态" width="80">
          <template #default="{ row }">
            <el-tag :type="row.is_read ? 'info' : 'warning'">
              {{ row.is_read ? '已读' : '未读' }}
            </el-tag>
          </template>
        </el-table-column>
        <el-table-column prop="created_at" label="触发时间" width="180" />
        <el-table-column label="操作" width="100" fixed="right">
          <template #default="{ row }">
            <el-button size="small" @click="markAsRead(row)" :disabled="row.is_read">
              标记已读
            </el-button>
          </template>
        </el-table-column>
      </el-table>

      <el-pagination
        v-model:current-page="logsPagination.page"
        v-model:page-size="logsPagination.per_page"
        :total="logsPagination.total"
        @current-change="loadWarningLogs"
        layout="total, prev, pager, next"
        style="margin-top: 20px; justify-content: flex-end;"
      />
    </el-card>

    <!-- 创建/编辑规则对话框 -->
    <el-dialog
      v-model="dialogVisible"
      :title="dialogMode === 'create' ? '新增预警规则' : '编辑预警规则'"
      width="600px"
    >
      <el-form :model="ruleForm" :rules="rules" ref="ruleFormRef" label-width="120px">
        <el-form-item label="规则名称" prop="rule_name">
          <el-input v-model="ruleForm.rule_name" placeholder="请输入规则名称" />
        </el-form-item>
        <el-form-item label="规则类型" prop="rule_type">
          <el-select v-model="ruleForm.rule_type" placeholder="请选择规则类型" style="width: 100%;">
            <el-option label="库存预警" value="stock" />
            <el-option label="效期预警" value="expiry" />
            <el-option label="积压预警" value="overstock" />
          </el-select>
        </el-form-item>
        <el-form-item label="条件字段" prop="condition_field">
          <el-select v-model="ruleForm.condition_field" placeholder="请选择条件字段" style="width: 100%;">
            <el-option label="库存数量" value="quantity" />
            <el-option label="库存金额" value="amount" />
            <el-option label="可用天数" value="available_days" />
          </el-select>
        </el-form-item>
        <el-form-item label="比较运算符" prop="condition_operator">
          <el-select v-model="ruleForm.condition_operator" placeholder="请选择运算符" style="width: 100%;">
            <el-option label="小于等于" value="<=" />
            <el-option label="小于" value="<" />
            <el-option label="大于等于" value=">=" />
            <el-option label="大于" value=">" />
            <el-option label="等于" value="=" />
          </el-select>
        </el-form-item>
        <el-form-item label="阈值" prop="threshold_value">
          <el-input v-model="ruleForm.threshold_value" placeholder="请输入阈值" />
        </el-form-item>
        <el-form-item label="阈值单位" prop="threshold_unit">
          <el-input v-model="ruleForm.threshold_unit" placeholder="例如：个、元、天" />
        </el-form-item>
        <el-form-item label="预警级别" prop="warning_level">
          <el-select v-model="ruleForm.warning_level" placeholder="请选择预警级别" style="width: 100%;">
            <el-option label="紧急" value="high" />
            <el-option label="重要" value="medium" />
            <el-option label="提示" value="low" />
          </el-select>
        </el-form-item>
        <el-form-item label="通知方式" prop="notification_methods">
          <el-checkbox-group v-model="ruleForm.notification_methods">
            <el-checkbox label="system">系统消息</el-checkbox>
            <el-checkbox label="email">邮件</el-checkbox>
            <el-checkbox label="sms">短信</el-checkbox>
          </el-checkbox-group>
        </el-form-item>
        <el-form-item label="是否启用" prop="enabled">
          <el-switch v-model="ruleForm.enabled" />
        </el-form-item>
        <el-form-item label="备注" prop="remark">
          <el-input v-model="ruleForm.remark" type="textarea" :rows="3" placeholder="请输入备注" />
        </el-form-item>
      </el-form>
      <template #footer>
        <el-button @click="dialogVisible = false">取消</el-button>
        <el-button type="primary" @click="submitRuleForm" :loading="submitting">
          确定
        </el-button>
      </template>
    </el-dialog>
  </div>
</template>

<script setup>
import { ref, reactive, onMounted } from 'vue'
import { ElMessage, ElMessageBox } from 'element-plus'

const loading = ref(false)
const logsLoading = ref(false)
const dialogVisible = ref(false)
const dialogMode = ref('create')
const submitting = ref(false)
const ruleFormRef = ref(null)

const rules = ref([])
const warningLogs = ref([])

const logsPagination = reactive({
  page: 1,
  per_page: 20,
  total: 0
})

const ruleForm = reactive({
  rule_name: '',
  rule_type: 'stock',
  condition_field: 'quantity',
  condition_operator: '<=',
  threshold_value: '',
  threshold_unit: '',
  warning_level: 'medium',
  notification_methods: ['system'],
  enabled: true,
  remark: ''
})

const formRules = {
  rule_name: [{ required: true, message: '请输入规则名称', trigger: 'blur' }],
  rule_type: [{ required: true, message: '请选择规则类型', trigger: 'change' }],
  condition_field: [{ required: true, message: '请选择条件字段', trigger: 'change' }],
  condition_operator: [{ required: true, message: '请选择运算符', trigger: 'change' }],
  threshold_value: [{ required: true, message: '请输入阈值', trigger: 'blur' }]
}

// 加载预警规则
const loadRules = async () => {
  loading.value = true
  try {
    const response = await fetch('/api/warning/rules')
    const result = await response.json()
    if (result.success) {
      rules.value = result.data
    } else {
      ElMessage.error(result.message)
    }
  } catch (error) {
    ElMessage.error('加载规则失败')
  } finally {
    loading.value = false
  }
}

// 加载预警日志
const loadWarningLogs = async () => {
  logsLoading.value = true
  try {
    const response = await fetch(`/api/warning/logs?page=${logsPagination.page}&per_page=${logsPagination.per_page}`)
    const result = await response.json()
    if (result.success) {
      warningLogs.value = result.data.list
      logsPagination.total = result.data.total
    } else {
      ElMessage.error(result.message)
    }
  } catch (error) {
    ElMessage.error('加载日志失败')
  } finally {
    logsLoading.value = false
  }
}

// 显示创建对话框
const showCreateDialog = () => {
  dialogMode.value = 'create'
  Object.assign(ruleForm, {
    rule_name: '',
    rule_type: 'stock',
    condition_field: 'quantity',
    condition_operator: '<=',
    threshold_value: '',
    threshold_unit: '',
    warning_level: 'medium',
    notification_methods: ['system'],
    enabled: true,
    remark: ''
  })
  dialogVisible.value = true
}

// 显示编辑对话框
const showEditDialog = (row) => {
  dialogMode.value = 'edit'
  Object.assign(ruleForm, {
    rule_name: row.rule_name,
    rule_type: row.rule_type,
    condition_field: row.condition_field,
    condition_operator: row.condition_operator,
    threshold_value: row.threshold_value,
    threshold_unit: row.threshold_unit,
    warning_level: row.warning_level,
    notification_methods: JSON.parse(row.notification_method || '[]'),
    enabled: row.enabled,
    remark: row.remark || ''
  })
  ruleForm.id = row.id
  dialogVisible.value = true
}

// 提交规则表单
const submitRuleForm = async () => {
  if (!ruleFormRef.value) return
  
  await ruleFormRef.value.validate(async (valid) => {
    if (!valid) return
    
    submitting.value = true
    try {
      const url = dialogMode.value === 'create' ? '/api/warning/rules' : `/api/warning/rules/${ruleForm.id}`
      const method = dialogMode.value === 'create' ? 'POST' : 'PUT'
      
      const response = await fetch(url, {
        method,
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(ruleForm)
      })
      
      const result = await response.json()
      if (result.success) {
        ElMessage.success(dialogMode.value === 'create' ? '创建成功' : '更新成功')
        dialogVisible.value = false
        loadRules()
      } else {
        ElMessage.error(result.message)
      }
    } catch (error) {
      ElMessage.error('操作失败')
    } finally {
      submitting.value = false
    }
  })
}

// 切换规则状态
const toggleRule = async (row) => {
  try {
    const response = await fetch(`/api/warning/rules/${row.id}/toggle`, {
      method: 'POST'
    })
    
    const result = await response.json()
    if (result.success) {
      ElMessage.success(result.message)
      loadRules()
    } else {
      ElMessage.error(result.message)
    }
  } catch (error) {
    ElMessage.error('操作失败')
  }
}

// 删除规则
const deleteRule = (row) => {
  ElMessageBox.confirm('确定要删除该预警规则吗？', '提示', {
    confirmButtonText: '确定',
    cancelButtonText: '取消',
    type: 'warning'
  }).then(async () => {
    try {
      const response = await fetch(`/api/warning/rules/${row.id}`, {
        method: 'DELETE'
      })
      
      const result = await response.json()
      if (result.success) {
        ElMessage.success('删除成功')
        loadRules()
      } else {
        ElMessage.error(result.message)
      }
    } catch (error) {
      ElMessage.error('删除失败')
    }
  })
}

// 标记为已读
const markAsRead = async (row) => {
  try {
    const response = await fetch(`/api/warning/logs/${row.id}/read`, {
      method: 'POST'
    })
    
    const result = await response.json()
    if (result.success) {
      ElMessage.success('标记成功')
      row.is_read = true
    } else {
      ElMessage.error(result.message)
    }
  } catch (error) {
    ElMessage.error('操作失败')
  }
}

// 工具函数
const getRuleTypeTag = (type) => {
  const tagMap = {
    stock: '',
    expiry: 'warning',
    overstock: 'danger'
  }
  return tagMap[type] || ''
}

const getRuleTypeText = (type) => {
  const textMap = {
    stock: '库存预警',
    expiry: '效期预警',
    overstock: '积压预警'
  }
  return textMap[type] || type
}

const getOperatorText = (operator) => {
  const textMap = {
    '<=': '≤',
    '<': '<',
    '>=': '≥',
    '>': '>',
    '=': '='
  }
  return textMap[operator] || operator
}

const getLevelTag = (level) => {
  const tagMap = {
    high: 'danger',
    medium: 'warning',
    low: 'info'
  }
  return tagMap[level] || ''
}

const getLevelText = (level) => {
  const textMap = {
    high: '紧急',
    medium: '重要',
    low: '提示'
  }
  return textMap[level] || level
}

onMounted(() => {
  loadRules()
  loadWarningLogs()
})
</script>

<style scoped>
.warning-management {
  padding: 20px;
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
</style>
{% endraw %}
