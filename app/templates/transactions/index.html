{% extends 'base.html' %}

{% block title %}交易管理{% endblock %}

{% block content %}
<div class="container-fluid">
    <!-- 页面标题 -->
    <div class="d-sm-flex align-items-center justify-content-between mb-4">
        <h1 class="h3 mb-0 text-gray-800">交易管理</h1>
        <a href="{{ url_for('transactions.create') }}" class="d-none d-sm-inline-block btn btn-sm btn-primary shadow-sm">
            <i class="fas fa-plus fa-sm text-white-50"></i> 新建交易
        </a>
    </div>

    <!-- 交易列表 -->
    <div class="card shadow mb-4">
        <div class="card-header py-3">
            <h6 class="m-0 font-weight-bold text-primary">交易记录</h6>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-bordered" id="dataTable" width="100%" cellspacing="0">
                    <thead>
                        <tr>
                            <th>交易ID</th>
                            <th>交易类型</th>
                            <th>仓库</th>
                            <th>备件</th>
                            <th>数量</th>
                            <th>金额</th>
                            <th>创建时间</th>
                            <th>操作人</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- 交易记录将通过JavaScript动态加载 -->
                        <tr>
                            <td colspan="9" class="text-center">暂无交易记录</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// 页面加载时初始化数据
$(document).ready(function() {
    // 初始化DataTable
    $('#dataTable').DataTable({
        "paging": true,
        "lengthChange": true,
        "searching": true,
        "ordering": true,
        "info": true,
        "autoWidth": false,
        "responsive": true
    });
});
</script>
{% endblock %}
