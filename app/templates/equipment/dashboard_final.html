<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设备仪表盘 - 设备分布地图</title>
    
    <!-- Bootstrap CSS - 只用一个 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@6.0.0/css/all.min.css" rel="stylesheet">
    <!-- 高德地图 API - 官方 CDN -->
    <script type="text/javascript">
        window._AMapSecurityConfig = {
            securityJsCode: ''
        }
    </script>
    <script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=68a794da887702f9e266fc3e28e5d3ae"></script>
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: none;
        }
        .stat-card {
            transition: transform 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        #mapContainer {
            height: 600px;
            width: 100%;
            border-radius: 10px;
        }
        .header-section {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- 头部 -->
        <div class="header-section">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="mb-1">
                        <i class="fas fa-chart-line text-primary me-2"></i>设备仪表盘
                    </h2>
                    <p class="text-muted mb-0">基于高德地图的设备分布可视化</p>
                </div>
                <button class="btn btn-outline-primary" onclick="location.reload()">
                    <i class="fas fa-sync-alt me-1"></i>刷新
                </button>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card stat-card">
                    <div class="card-body text-center">
                        <h6 class="text-muted">设备总数</h6>
                        <h3 class="mb-0 text-primary" id="totalCount">-</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card">
                    <div class="card-body text-center">
                        <h6 class="text-muted">运行中</h6>
                        <h3 class="mb-0 text-success" id="runningCount">-</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card">
                    <div class="card-body text-center">
                        <h6 class="text-muted">有位置设备</h6>
                        <h3 class="mb-0 text-info" id="locatedCount">-</h3>
                    </div>
                </div>
            </div>
        </div>

        <!-- 地图 -->
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header bg-white py-3">
                        <h6 class="mb-0">
                            <i class="fas fa-map-marked-alt me-2"></i>设备分布地图
                        </h6>
                    </div>
                    <div class="card-body p-0">
                        <div id="mapContainer"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 设备详情弹窗 -->
    <div class="modal fade" id="deviceModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">设备详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalBody"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                    <a href="#" id="viewBtn" class="btn btn-primary">查看详情</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        let map = null;
        let markers = [];

        // 简化的错误处理 - 只过滤重要错误
        const originalConsoleError = console.error;
        console.error = function(...args) {
            const str = String(args);
            if (str.includes('flydata') || str.includes('USERKEY_PLAT_NOMATCH') || str.includes('USERPLAY_NOTMATCH')) {
                return;
            }
            originalConsoleError.apply(console, args);
        };

        // 快速初始化地图
        function initMap() {
            try {
                map = new AMap.Map('mapContainer', {
                    zoom: 4,
                    center: [104.066544, 37.564716],
                    viewMode: '2D',
                    zoomControl: true,
                    scale: true
                });
                
                loadDevices();
                
            } catch (error) {
                console.error('地图初始化失败:', error);
                document.getElementById('mapContainer').innerHTML = 
                    '<div class="alert alert-danger m-3">地图初始化失败：' + error.message + '</div>';
            }
        }

        // DOM 加载完成后立即初始化
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof AMap !== 'undefined' && AMap.Map) {
                initMap();
            } else {
                window.onload = initMap;
            }
        });

        // 加载设备
        function loadDevices() {
            console.log('📡 开始加载设备数据...');
            
            fetch('/equipment/api/locations')
                .then(res => res.json())
                .then(data => {
                    console.log('✅ 设备数据加载成功:', data.length, '台设备');
                    
                    // 更新统计
                    document.getElementById('totalCount').textContent = data.length;
                    document.getElementById('locatedCount').textContent = data.length;
                    document.getElementById('runningCount').textContent = 
                        data.filter(d => d.status === 'running').length;
                    
                    if (data.length === 0) {
                        document.getElementById('mapContainer').innerHTML = 
                            '<div class="alert alert-info m-3">暂无设备位置数据</div>';
                        return;
                    }
                    
                    // 添加标记
                    data.forEach(device => {
                        console.log('📍 添加设备:', device.name);
                        
                        const marker = new AMap.Marker({
                            position: [device.longitude, device.latitude],
                            title: device.name
                        });
                        
                        marker.content = `
                            <div style="min-width:200px">
                                <strong>${device.name}</strong><br>
                                <small>${device.equipment_code}</small><br>
                                <span class="badge bg-${device.color}">${device.status_label}</span><br>
                                <small>${device.map_address || ''}</small>
                            </div>
                        `;
                        
                        marker.on('click', function() {
                            showDeviceDetail(device);
                            this.openInfoWindow(new AMap.InfoWindow({
                                content: marker.content,
                                offset: new AMap.Pixel(0, -30)
                            }));
                        });
                        
                        map.add(marker);
                        markers.push(marker);
                    });
                    
                    // 调整视野
                    if (markers.length > 0) {
                        map.setFitView(markers);
                        console.log('✅ 视野调整完成');
                    }
                    
                })
                .catch(error => {
                    console.error('❌ 加载设备失败:', error);
                    document.getElementById('mapContainer').innerHTML = 
                        '<div class="alert alert-danger m-3">加载设备数据失败</div>';
                });
        }

        // 显示设备详情
        function showDeviceDetail(device) {
            document.getElementById('modalBody').innerHTML = `
                <div class="mb-2"><strong>设备编号:</strong> ${device.equipment_code}</div>
                <div class="mb-2"><strong>设备名称:</strong> ${device.name}</div>
                <div class="mb-2"><strong>型号:</strong> ${device.model}</div>
                <div class="mb-2"><strong>系列:</strong> ${device.series}</div>
                <div class="mb-2"><strong>状态:</strong> <span class="badge bg-${device.color}">${device.status_label}</span></div>
                <div class="mb-2"><strong>位置:</strong> ${device.map_address || '-'}</div>
            `;
            document.getElementById('viewBtn').href = `/equipment/${device.id}`;
            
            const modal = new bootstrap.Modal(document.getElementById('deviceModal'));
            modal.show();
        }
    </script>
</body>
</html>
