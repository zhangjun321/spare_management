<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高德地图直接测试</title>
    
    <script type="text/javascript">
        window._AMapSecurityConfig = {
            securityJsCode: '2dde894eb622b4650b1f691029abf5ce'
        }
    </script>
    <script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=90691a64632bff38606380489aac80e9"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            padding: 20px;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .info-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .info-card h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }
        .info-card p {
            font-family: monospace;
            font-size: 13px;
            color: #333;
            word-break: break-all;
        }
        #mapContainer {
            width: 100%;
            height: 600px;
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }
        .status {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
        }
        .status.success {
            border-left: 4px solid #52c41a;
            background: #f6ffed;
        }
        .status.error {
            border-left: 4px solid #ff4d4f;
            background: #fff2f0;
        }
        .status.loading {
            border-left: 4px solid #1890ff;
            background: #e6f7ff;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #1890ff;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            margin-top: 10px;
            cursor: pointer;
            border: none;
            font-size: 14px;
        }
        .btn:hover {
            background: #40a9ff;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🗺️ 高德地图直接测试</h1>
        <p>这个页面专门用来验证高德地图 API 是否能正常显示底图</p>
    </div>

    <div class="info-grid">
        <div class="info-card">
            <h3>🔑 API Key</h3>
            <p>90691a64632bff38606380489aac80e9</p>
        </div>
        <div class="info-card">
            <h3>🛡️ 安全密钥 (SecurityJsCode)</h3>
            <p>2dde894eb622b4650b1f691029abf5ce</p>
        </div>
        <div class="info-card">
            <h3>📍 地图中心点</h3>
            <p>北京 (116.397428, 39.90923)</p>
        </div>
    </div>

    <div class="status loading" id="status">
        <h3>⏳ 正在初始化地图...</h3>
    </div>

    <div id="mapContainer"></div>

    <div style="text-align: center; margin-top: 20px;">
        <button class="btn" onclick="location.reload()">🔄 重新加载</button>
    </div>

    <script>
        console.log('📄 页面开始加载');

        window.onload = function() {
            console.log('✅ 页面加载完成');

            const statusEl = document.getElementById('status');

            if (typeof AMap === 'undefined') {
                statusEl.className = 'status error';
                statusEl.innerHTML = '<h3>❌ AMap 未定义 - API 脚本加载失败</h3><p>请检查网络连接或 API Key 是否正确</p>';
                console.error('❌ AMap is undefined');
                return;
            }

            console.log('✅ AMap loaded successfully');

            try {
                console.log('📍 Creating map...');
                
                const map = new AMap.Map('mapContainer', {
                    zoom: 10,
                    center: [116.397428, 39.90923],
                    viewMode: '2D',
                    zoomControl: true,
                    scale: true
                });

                console.log('✅ Map created');
                statusEl.className = 'status success';
                statusEl.innerHTML = '<h3>✅ 地图创建成功！</h3><p>如果能看到地图底图（道路、建筑等），说明 API 配置正确！</p>';

                map.on('complete', function() {
                    console.log('🗺️ Map complete - tiles loaded');
                    statusEl.innerHTML = '<h3>🎉 地图加载完成！</h3><p>底图已显示，API 配置完全正确！</p>';
                });

                const marker = new AMap.Marker({
                    position: [116.397428, 39.90923],
                    title: '北京'
                });
                map.add(marker);
                console.log('📍 Marker added');

            } catch (error) {
                console.error('❌ Error:', error);
                statusEl.className = 'status error';
                statusEl.innerHTML = '<h3>❌ 地图创建失败</h3><p>' + error.message + '</p>';
            }
        };
    </script>
</body>
</html>
