{% extends "base.html" %}

{% block page_title %}设备仪表盘{% endblock %}

{% block head %}
<!-- 高德地图安全配置 -->
<script type="text/javascript">
    window._AMapSecurityConfig = {
        securityJsCode: '2dde894eb622b4650b1f691029abf5ce'
    }
</script>
<!-- 高德地图 API -->
<script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=90691a64632bff38606380489aac80e9"></script>
<style>
#mapContainer {
    height: 600px;
    width: 100%;
    background: #f5f5f5;
}
</style>
{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <!-- 页面标题 -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="mb-1">
                        <i class="fas fa-chart-line text-primary me-2"></i>设备仪表盘
                    </h2>
                    <p class="text-muted mb-0">基于高德地图的设备分布可视化</p>
                </div>
                <div>
                    <button class="btn btn-outline-primary" onclick="refreshMap()">
                        <i class="fas fa-sync-alt me-1"></i>刷新
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 统计卡片 -->
    <div class="row mb-4">
        <div class="col-md-2">
            <div class="card border-0 shadow-sm text-center">
                <div class="card-body">
                    <h6 class="text-muted small">设备总数</h6>
                    <h3 class="mb-0 text-primary">{{ stats.total }}</h3>
                </div>
            </div>
        </div>
        <div class="col-md-2">
            <div class="card border-0 shadow-sm text-center">
                <div class="card-body">
                    <h6 class="text-muted small">运行中</h6>
                    <h3 class="mb-0 text-success">{{ stats.running }}</h3>
                </div>
            </div>
        </div>
        <div class="col-md-2">
            <div class="card border-0 shadow-sm text-center">
                <div class="card-body">
                    <h6 class="text-muted small">有位置设备</h6>
                    <h3 class="mb-0 text-info" id="locatedCount">-</h3>
                </div>
            </div>
        </div>
    </div>

    <!-- 地图 -->
    <div class="row">
        <div class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white py-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <h6 class="mb-0">
                            <i class="fas fa-map-marked-alt me-2"></i>设备分布地图
                        </h6>
                        <span class="badge bg-info" id="mapDeviceCount">0 台设备</span>
                    </div>
                </div>
                <div class="card-body p-0">
                    <div id="mapContainer"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 设备详情弹窗 -->
<div class="modal fade" id="deviceModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">设备详情</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                <a href="#" id="viewBtn" class="btn btn-primary">查看详情</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let map = null;
let markers = [];

// 等待 AMap 加载完成
function waitForAMap(callback, maxAttempts = 30, interval = 200) {
    let attempts = 0;
    const checkInterval = setInterval(() => {
        attempts++;
        if (typeof AMap !== 'undefined' && AMap.Map) {
            clearInterval(checkInterval);
            console.log('✅ 高德地图 API 加载成功');
            callback();
        } else if (attempts >= maxAttempts) {
            clearInterval(checkInterval);
            console.error('❌ 高德地图 API 加载超时');
            document.getElementById('mapContainer').innerHTML = 
                '<div class="alert alert-danger m-3">高德地图 API 加载失败，请检查网络连接或 API Key 配置</div>';
        } else {
            console.log(`⏳ 等待高德地图加载... (${attempts}/${maxAttempts})`);
        }
    }, interval);
}

// 初始化地图
function initMap() {
    console.log('📍 开始初始化高德地图...');
    
    try {
        map = new AMap.Map('mapContainer', {
            zoom: 4,
            center: [104.066544, 37.564716],
            viewMode: '2D',
            zoomControl: true,
            scale: true
        });
        
        console.log('✅ 地图创建成功');
        loadDevices();
        
    } catch (error) {
        console.error('❌ 地图初始化失败:', error);
        document.getElementById('mapContainer').innerHTML = 
            '<div class="alert alert-danger m-3">地图初始化失败：' + error.message + '</div>';
    }
}

// 加载设备
function loadDevices() {
    console.log('📡 开始加载设备数据...');
    
    fetch('/equipment/api/locations')
        .then(res => {
            if (!res.ok) {
                throw new Error('HTTP ' + res.status);
            }
            return res.json();
        })
        .then(data => {
            console.log('✅ 设备数据加载成功:', data.length, '台设备');
            document.getElementById('locatedCount').textContent = data.length;
            document.getElementById('mapDeviceCount').textContent = data.length + ' 台';
            
            if (data.length === 0) {
                document.getElementById('mapContainer').innerHTML = 
                    '<div class="alert alert-info m-3">暂无设备位置数据</div>';
                return;
            }
            
            data.forEach(device => {
                console.log('📍 添加设备:', device.name);
                
                const marker = new AMap.Marker({
                    position: [device.longitude, device.latitude],
                    title: device.name
                });
                
                marker.content = `
                    <div style="min-width:200px">
                        <strong>${device.name}</strong><br>
                        <small>${device.equipment_code}</small><br>
                        <span class="badge bg-${device.color}">${device.status_label}</span><br>
                        <small>${device.map_address || ''}</small>
                    </div>
                `;
                
                marker.on('click', function() {
                    showDeviceDetail(device);
                    this.openInfoWindow(new AMap.InfoWindow({
                        content: marker.content,
                        offset: new AMap.Pixel(0, -30)
                    }));
                });
                
                map.add(marker);
                markers.push(marker);
            });
            
            if (markers.length > 0) {
                map.setFitView(markers);
                console.log('✅ 视野调整完成');
            }
            
        })
        .catch(error => {
            console.error('❌ 加载设备失败:', error);
            document.getElementById('mapContainer').innerHTML = 
                '<div class="alert alert-danger m-3">加载设备数据失败: ' + error.message + '</div>';
        });
}

// 显示设备详情
function showDeviceDetail(device) {
    document.getElementById('modalBody').innerHTML = `
        <div class="mb-2"><strong>设备编号:</strong> ${device.equipment_code}</div>
        <div class="mb-2"><strong>设备名称:</strong> ${device.name}</div>
        <div class="mb-2"><strong>型号:</strong> ${device.model}</div>
        <div class="mb-2"><strong>系列:</strong> ${device.series}</div>
        <div class="mb-2"><strong>状态:</strong> <span class="badge bg-${device.color}">${device.status_label}</span></div>
        <div class="mb-2"><strong>位置:</strong> ${device.map_address || '-'}</div>
    `;
    document.getElementById('viewBtn').href = `/equipment/${device.id}`;
    
    const modal = new bootstrap.Modal(document.getElementById('deviceModal'));
    modal.show();
}

// 刷新地图
function refreshMap() {
    location.reload();
}

// 页面加载完成后开始等待 AMap
document.addEventListener('DOMContentLoaded', function() {
    console.log('📄 页面加载完成');
    waitForAMap(initMap);
});
</script>
{% endblock %}
