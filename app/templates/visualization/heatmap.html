{% extends "base.html" %}

{% block title %}库存热力图 - {{ warehouse.name }}{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <!-- 页面标题 -->
    <div class="row mb-4">
        <div class="col-12">
            <h2 class="mb-3">
                <i class="fas fa-fire-alt me-2"></i>{{ warehouse.name }} - 库存热力图
            </h2>
            <p class="text-muted">多维度可视化展示库存分布情况</p>
        </div>
    </div>

    <!-- 维度选择 -->
    <div class="row mb-4">
        <div class="col-md-12">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-0 py-3">
                    <h5 class="mb-0">选择维度</h5>
                </div>
                <div class="card-body">
                    <button class="btn btn-outline-primary me-2 active" onclick="changeDimension('density')">
                        <i class="fas fa-cubes me-1"></i>库存密度
                    </button>
                    <button class="btn btn-outline-info me-2" onclick="changeDimension('turnover')">
                        <i class="fas fa-chart-line me-1"></i>周转率
                    </button>
                    <button class="btn btn-outline-warning me-2" onclick="changeDimension('age')">
                        <i class="fas fa-hourglass-half me-1"></i>库龄
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 热力图 -->
    <div class="row mb-4">
        <div class="col-md-8">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-0 py-3">
                    <h5 class="mb-0">热力图展示</h5>
                </div>
                <div class="card-body p-0">
                    <canvas id="heatmapCanvas" width="800" height="600"></canvas>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <!-- 图例 -->
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-header bg-white border-0 py-3">
                    <h5 class="mb-0">图例说明</h5>
                </div>
                <div class="card-body">
                    <canvas id="legendCanvas" width="300" height="100"></canvas>
                    <div id="legendText" class="mt-3 small text-muted">
                        <!-- 动态填充 -->
                    </div>
                </div>
            </div>
            
            <!-- 统计信息 -->
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-0 py-3">
                    <h5 class="mb-0">统计信息</h5>
                </div>
                <div class="card-body">
                    <table class="table table-sm">
                        <tr>
                            <td>最大值</td>
                            <td class="text-end"><strong id="maxValue">-</strong></td>
                        </tr>
                        <tr>
                            <td>最小值</td>
                            <td class="text-end"><strong id="minValue">-</strong></td>
                        </tr>
                        <tr>
                            <td>平均值</td>
                            <td class="text-end"><strong id="avgValue">-</strong></td>
                        </tr>
                        <tr>
                            <td>数据点数</td>
                            <td class="text-end"><strong id="pointCount">-</strong></td>
                        </tr>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let currentDimension = '{{ dimension }}';
let heatmapData = null;

// 维度说明
const dimensionInfo = {
    'density': {
        title: '库存密度',
        description: '显示各库位的库存数量分布，颜色越深表示库存越多',
        unit: '件',
        colorStart: '#FFFFCC',
        colorEnd: '#FF0000'
    },
    'turnover': {
        title: '周转率',
        description: '显示备件的周转速度，颜色越深表示周转越快',
        unit: '次/月',
        colorStart: '#E0F3DB',
        colorEnd: '#0868AC'
    },
    'age': {
        title: '库龄',
        description: '显示库存存放时间，颜色越深表示库龄越长',
        unit: '天',
        colorStart: '#FFFFCC',
        colorEnd: '#800026'
    }
};

// 加载热力图数据
function loadHeatmapData() {
    fetch(`{{ url_for('visualization.get_heatmap_data', warehouse_id=warehouse.id) }}?dimension=${currentDimension}`)
        .then(response => response.json())
        .then(data => {
            heatmapData = data;
            renderHeatmap(data);
            renderLegend(data);
            updateStatistics(data);
        })
        .catch(error => {
            console.error('加载失败:', error);
        });
}

// 渲染热力图
function renderHeatmap(data) {
    const canvas = document.getElementById('heatmapCanvas');
    const ctx = canvas.getContext('2d');
    
    // 清空画布
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    if (!data.points || data.points.length === 0) {
        ctx.fillStyle = '#f0f0f0';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#666';
        ctx.font = '16px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('暂无数据', canvas.width / 2, canvas.height / 2);
        return;
    }
    
    // 计算网格
    const maxX = Math.max(...data.points.map(p => p.x));
    const maxY = Math.max(...data.points.map(p => p.y));
    
    const cellWidth = canvas.width / (maxX + 2);
    const cellHeight = canvas.height / (maxY + 2);
    
    // 绘制每个点
    data.points.forEach(point => {
        const x = point.x * cellWidth;
        const y = point.y * cellHeight;
        
        // 计算颜色
        const color = getColor(point.value, data.min_value, data.max_value);
        
        // 绘制矩形
        ctx.fillStyle = color;
        ctx.fillRect(x + 2, y + 2, cellWidth - 4, cellHeight - 4);
        
        // 绘制值
        ctx.fillStyle = getTextColor(color);
        ctx.font = '10px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(point.value.toFixed(1), x + cellWidth / 2, y + cellHeight / 2 + 4);
    });
}

// 渲染图例
function renderLegend(data) {
    const canvas = document.getElementById('legendCanvas');
    const ctx = canvas.getContext('2d');
    
    const info = dimensionInfo[currentDimension];
    
    // 绘制渐变
    const gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
    gradient.addColorStop(0, info.colorStart);
    gradient.addColorStop(1, info.colorEnd);
    
    ctx.fillStyle = gradient;
    ctx.fillRect(20, 30, canvas.width - 40, 40);
    
    // 绘制刻度
    ctx.fillStyle = '#333';
    ctx.font = '12px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(data.min_value.toFixed(1), 20, 20);
    ctx.fillText(data.max_value.toFixed(1), canvas.width - 20, 20);
    ctx.fillText(info.unit, canvas.width / 2, 20);
    
    // 更新说明文字
    document.getElementById('legendText').innerHTML = `
        <strong>${info.title}</strong><br>
        ${info.description}
    `;
}

// 更新统计信息
function updateStatistics(data) {
    document.getElementById('maxValue').textContent = data.max_value.toFixed(2);
    document.getElementById('minValue').textContent = data.min_value.toFixed(2);
    document.getElementById('avgValue').textContent = data.avg_value.toFixed(2);
    document.getElementById('pointCount').textContent = data.points.length;
}

// 获取颜色（根据值）
function getColor(value, min, max) {
    const info = dimensionInfo[currentDimension];
    const ratio = (value - min) / (max - min || 1);
    
    // 简化处理：使用 HSL 颜色空间
    const hue = (1 - ratio) * 120; // 从绿色到红色
    return `hsl(${hue}, 70%, 50%)`;
}

// 获取文字颜色（根据背景）
function getTextColor(bgColor) {
    // 简化处理：总是返回黑色或白色
    return '#000';
}

// 切换维度
function changeDimension(dimension) {
    currentDimension = dimension;
    
    // 更新按钮状态
    document.querySelectorAll('.btn-outline-primary, .btn-outline-info, .btn-outline-warning').forEach(btn => {
        btn.classList.remove('active');
    });
    event.target.classList.add('active');
    
    // 重新加载数据
    loadHeatmapData();
}

// 页面加载完成后初始化
document.addEventListener('DOMContentLoaded', loadHeatmapData);
</script>
{% endblock %}
