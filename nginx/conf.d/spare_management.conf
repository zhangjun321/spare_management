# ============================================================
# Nginx 站点配置 - 备件管理系统
# 功能：反向代理 Flask API + React SPA + 静态资源服务
# 横向扩展：upstream 使用 least_conn 负载均衡，后端多实例
# ============================================================

# ── 上游后端服务（支持多实例横向扩展） ──────────────────────
upstream flask_backend {
    least_conn;                          # 最少连接数负载均衡算法

    # docker-compose --scale backend=3 后，Docker DNS 轮询解析
    # 多实例时 Docker 内部 DNS 会返回多个 IP
    server backend:5000 max_fails=3 fail_timeout=30s;

    # 如果手动指定多实例（不使用 --scale），可取消注释：
    # server backend_1:5000 weight=1 max_fails=3 fail_timeout=30s;
    # server backend_2:5000 weight=1 max_fails=3 fail_timeout=30s;
    # server backend_3:5000 weight=1 max_fails=3 fail_timeout=30s;

    keepalive 32;                        # 保持与后端的长连接
}

# ── HTTP -> HTTPS 重定向（生产环境启用） ─────────────────────
# server {
#     listen 80;
#     server_name your-domain.com;
#     return 301 https://$host$request_uri;
# }

# ── 主站点配置 ───────────────────────────────────────────────
server {
    listen 80;
    server_name _;                       # 接受所有 Host（容器内使用）

    # ── HTTPS 配置（生产环境取消注释） ─────────────────────
    # listen 443 ssl http2;
    # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    # ssl_session_cache   shared:SSL:10m;

    root /usr/share/nginx/html;
    index index.html;

    # ── 健康检查端点 ────────────────────────────────────────
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── React SPA 静态资源（带版本哈希，强缓存） ───────────
    location /static/react/assets/ {
        alias /usr/share/nginx/html/static/react/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── React SPA HTML 入口（不缓存，保证更新） ────────────
    location /static/react/ {
        alias /usr/share/nginx/html/static/react/;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── 上传文件（uploads 目录） ─────────────────────────────
    location /uploads/ {
        alias /app/uploads/;
        expires 7d;
        add_header Cache-Control "public";
        # 只允许图片/文档，禁止执行
        location ~* \.(php|py|sh|pl|rb)$ {
            deny all;
        }
    }

    # ── Flask API 代理 ───────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass         http://flask_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";     # 关闭逐跳头，启用 keepalive

        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # 禁用缓冲（流式响应）
        proxy_buffering    off;
        proxy_buffer_size  4k;
    }

    # ── 登录接口限速 ────────────────────────────────────────
    location = /login {
        limit_req zone=login_limit burst=3 nodelay;
        proxy_pass         http://flask_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── React SPA 客户端路由兜底 ─────────────────────────────
    # /warehouse-react/ 开头的所有路径返回 React index.html
    location /warehouse-react/ {
        proxy_pass         http://flask_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── 其余请求代理到 Flask（Jinja2 SSR 页面） ─────────────
    location / {
        proxy_pass         http://flask_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }

    # ── 错误页面 ─────────────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
