# ============================================================
# 备件管理系统 - Docker Compose 编排
# 服务：mysql | redis | backend（可水平扩展）| nginx
# ============================================================

version: "3.9"

# ── 共享网络 ─────────────────────────────────────────────────
networks:
  spare-net:
    driver: bridge

# ── 持久化卷 ─────────────────────────────────────────────────
volumes:
  mysql-data:
  redis-data:
  uploads-data:
  logs-data:

services:

  # ── MySQL 8 ──────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: spare-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Kra@211314}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-spare_parts_db}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d:ro   # 初始化 SQL
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    networks:
      - spare-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-Kra@211314}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=256M
      - --max-connections=200
      - --slow-query-log=1
      - --slow-query-log-file=/var/lib/mysql/slow.log
      - --long-query-time=2

  # ── Redis 7 ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: spare-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-} --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1000
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - spare-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Flask 后端（支持 --scale backend=N 横向扩展）──────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: spare-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-Kra@211314}@mysql:3306/${MYSQL_DATABASE:-spare_parts_db}?charset=utf8mb4
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      USE_REDIS: "true"
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
      BAIDU_API_KEY: ${BAIDU_API_KEY:-}
    volumes:
      - uploads-data:/app/uploads
      - logs-data:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - spare-net
    # 注意：不直接暴露端口，由 Nginx 代理
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      replicas: ${BACKEND_REPLICAS:-1}
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  # ── Nginx 反向代理 + 静态资源 ─────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: spare-nginx:${IMAGE_TAG:-latest}
    container_name: spare-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro          # SSL 证书（可选）
      - uploads-data:/app/uploads:ro           # 共享 uploads 只读
      - logs-data:/var/log/nginx               # Nginx 访问日志
    depends_on:
      - backend
    networks:
      - spare-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3
