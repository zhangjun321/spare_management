# ============================================================
# GitHub Actions CI/CD 流水线
# 触发：main/develop 分支 push，以及 Pull Request
#
# 阶段：
#   1. lint        代码质量检查（flake8 + ESLint）
#   2. test        后端单元测试（pytest + MySQL 服务容器）
#   3. build       Docker 镜像构建 & 推送（仅 main 分支）
#   4. deploy-staging   部署到预发环境（仅 main 分支）
#   5. deploy-prod      部署到生产（需手动审批）
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository }}/spare-backend
  IMAGE_NGINX: ${{ github.repository }}/spare-nginx
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

# 取消同一分支的旧 workflow（节省资源）
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ──────────────────────────────────────────────────────────
  # JOB 1: Python 代码质量 + 安全扫描
  # ──────────────────────────────────────────────────────────
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint dependencies
        run: pip install flake8 flake8-bugbear bandit

      - name: flake8 code style
        run: |
          flake8 app/ run.py --max-line-length=120 \
            --exclude=app/static,app/migrations \
            --extend-ignore=E203,W503

      - name: bandit security scan
        run: |
          bandit -r app/ -ll -x app/static,app/tests \
            --skip B101,B601 -f txt || true

  # ──────────────────────────────────────────────────────────
  # JOB 2: 前端构建 + ESLint
  # ──────────────────────────────────────────────────────────
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npx eslint src/ --ext .js,.jsx --max-warnings 20 || true

      - name: Build React (verify no build errors)
        working-directory: frontend
        run: npm run build
        env:
          # 构建时输出到 dist，不影响 app/static
          VITE_BUILD_OUT: dist

  # ──────────────────────────────────────────────────────────
  # JOB 3: 后端单元测试（MySQL 服务容器）
  # ──────────────────────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: [lint-backend]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: spare_parts_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -ptest_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-cov

      - name: Run pytest
        env:
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret-key-not-for-production
          DATABASE_URL: mysql://root:test_password@localhost:3306/spare_parts_test?charset=utf8mb4
          REDIS_URL: redis://localhost:6379/0
          USE_REDIS: "false"
        run: |
          pytest app/tests/ -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short \
            -x \
            || echo "::warning::No tests found or tests failed (non-blocking)"

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ──────────────────────────────────────────────────────────
  # JOB 4: 构建并推送 Docker 镜像（仅 main 分支）
  # ──────────────────────────────────────────────────────────
  build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend, test-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # ── 构建后端镜像 ──
      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      # ── 构建 Nginx + React 镜像 ──
      - name: Build & push nginx image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NGINX }}:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NGINX }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────
  # JOB 5: 部署到预发环境（Staging）
  # ──────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: http://${{ secrets.STAGING_HOST }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_PORT || 22 }}
          script: |
            set -e
            cd /opt/spare_management

            # 拉取最新镜像
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull backend nginx

            # 滚动重启（零停机）
            docker compose up -d --no-deps --scale backend=2 backend
            sleep 10
            docker compose up -d --no-deps nginx

            # 清理旧镜像
            docker image prune -f

            echo "Staging deployment completed: ${{ needs.build-push.outputs.image-tag }}"

  # ──────────────────────────────────────────────────────────
  # JOB 6: 部署到生产（需手动审批）
  # ──────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production          # GitHub Environments 中配置 Required reviewers
      url: http://${{ secrets.PROD_HOST }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT || 22 }}
          script: |
            set -e
            cd /opt/spare_management

            # 备份当前运行镜像标签（用于快速回滚）
            CURRENT_TAG=$(docker inspect spare-backend --format '{{index .Config.Labels "org.opencontainers.image.version"}}' 2>/dev/null || echo "unknown")
            echo "Current tag: $CURRENT_TAG" >> /opt/spare_management/deploy.log

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 数据库迁移（在新容器中执行）
            docker compose run --rm backend flask db upgrade || true

            # 蓝绿滚动部署
            docker compose up -d --no-deps --scale backend=3 backend
            sleep 15

            # 健康检查
            for i in $(seq 1 5); do
              STATUS=$(curl -sf http://localhost/health && echo "ok" || echo "fail")
              if [ "$STATUS" = "ok" ]; then
                echo "Health check passed"
                break
              fi
              sleep 5
            done

            docker compose up -d --no-deps nginx
            docker compose scale backend=2
            docker image prune -f

            echo "Production deployment completed: ${{ needs.build-push.outputs.image-tag }}" >> /opt/spare_management/deploy.log
